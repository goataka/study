<link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<style>
  /* サイトヘッダーの「Study」タイトルリンクを非表示にする */
  .site-header .site-title { display: none; }
</style>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  // Jekyll が生成する <pre><code class="language-mermaid"> を <pre class="mermaid"> に変換してから初期化する
  document.querySelectorAll('code.language-mermaid').forEach((el) => {
    const pre = document.createElement('pre');
    pre.className = 'mermaid';
    pre.textContent = el.textContent;
    el.parentElement.replaceWith(pre);
  });
  mermaid.initialize({ startOnLoad: true });
</script>
<script>
  // クイズの解説パネル（iframe）内で表示されるとき、サイトヘッダーと下部のナビゲーションリンクを非表示にする
  // ?embedded=1 はクイズアプリが解説 iframe の src に付与するフラグ。
  // window !== window.top だけでは他の埋め込み用途でも発火するため、このフラグで適用範囲を限定する。
  if (window !== window.top && new URLSearchParams(location.search).get('embedded') === '1') {
    document.addEventListener('DOMContentLoaded', function () {
      // サイトヘッダー（「Study」などのサイトタイトルを含む）を非表示にする
      var siteHeader = document.querySelector('header.site-header');
      if (siteHeader) {
        siteHeader.style.display = 'none';
      }

      // 「目次」リンクを含む段落を探してナビゲーションブロック全体を非表示にする
      var navPara = Array.prototype.find.call(
        document.querySelectorAll('p'),
        function (p) { return p.textContent.indexOf('目次') !== -1; }
      );
      if (navPara) {
        // 直前の <hr> も非表示にする
        var prev = navPara.previousElementSibling;
        if (prev && prev.tagName === 'HR') {
          prev.style.display = 'none';
        }
        // 目次段落から末尾まで全要素を非表示にする
        var el = navPara;
        while (el) {
          el.style.display = 'none';
          el = el.nextElementSibling;
        }
      }
    });
  }
</script>
