<link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="子供向け学習アプリのサポートページです。">
<meta property="og:type" content="website">
<meta property="og:image" content="{{ '/ogp.png' | absolute_url }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ '/ogp.png' | absolute_url }}">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="子供向け学習アプリのサポートページです。">
<style>
  /* サイトヘッダーのタイトルリンクを非表示にする */
  .site-header .site-title { display: none; }
  /* クイズの解説パネル（iframe）内で表示されるとき、サイトヘッダー全体を非表示にする */
  html.embedded-mode header.site-header { display: none; }
  /* 解説ページの先頭に表示される「学習ドリル」サイトリンクを非表示にする */
  .markdown-body > h1:not([id]) { display: none; }
  /* フォントサイズ：中（クイズアプリのフォントサイズ設定に連動） */
  html.embedded-mode.font-size-medium { font-size: 1.2em; }
  html.embedded-mode.font-size-medium body { font-size: 1em !important; }
  /* フォントサイズ：大（クイズアプリのフォントサイズ設定に連動） */
  html.embedded-mode.font-size-large { font-size: 1.5em; }
  html.embedded-mode.font-size-large body { font-size: 1em !important; }
</style>
<script>
  // ?embedded=1 が付与されているとき（クイズの解説 iframe として表示されるとき）、
  // <html> に embedded-mode クラスを付与してヘッダーを即座に非表示にする。
  // sandbox="allow-scripts"（allow-same-origin なし）の iframe 内では
  // window !== window.top がエラーになる場合があるため、このフラグのみで判定する。
  if (new URLSearchParams(location.search).get('embedded') === '1') {
    document.documentElement.classList.add('embedded-mode');
  }
  // クイズアプリからフォントサイズ変更メッセージを受け取り、html 要素にクラスを付与する
  // e.source === window.parent で送信元を親フレームに限定し、第三者からの不正変更を防ぐ
  window.addEventListener('message', function(e) {
    if (e.source !== window.parent) return;
    if (e.data && e.data.type === 'fontSizeChanged') {
      document.documentElement.classList.remove('font-size-medium', 'font-size-large');
      if (e.data.level === 'medium') {
        document.documentElement.classList.add('font-size-medium');
      } else if (e.data.level === 'large') {
        document.documentElement.classList.add('font-size-large');
      }
    }
  });
</script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  // Jekyll が生成する <pre><code class="language-mermaid"> を <pre class="mermaid"> に変換してから初期化する
  document.querySelectorAll('code.language-mermaid').forEach((el) => {
    const pre = document.createElement('pre');
    pre.className = 'mermaid';
    pre.textContent = el.textContent;
    el.parentElement.replaceWith(pre);
  });
  mermaid.initialize({ startOnLoad: true });
</script>
