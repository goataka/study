<link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="子供向け学習アプリのサポートページです。">
<meta property="og:type" content="website">
<meta property="og:image" content="{{ '/ogp.png' | absolute_url }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ '/ogp.png' | absolute_url }}">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="子供向け学習アプリのサポートページです。">
<style>
  /* サイトヘッダーのタイトルリンクを非表示にする */
  .site-header .site-title { display: none; }
  /* クイズの解説パネル（iframe）内で表示されるとき、サイトヘッダー全体を非表示にする */
  html.embedded-mode header.site-header { display: none; }
  /* 解説ページの先頭に表示される「学習ドリル」サイトリンクを非表示にする */
  .markdown-body > h1:not([id]) { display: none; }
  /* フォントサイズ：中（クイズアプリのフォントサイズ設定に連動） */
  html.embedded-mode.font-size-medium { font-size: 1.2em; }
  html.embedded-mode.font-size-medium body { font-size: 1em !important; }
  /* フォントサイズ：大（クイズアプリのフォントサイズ設定に連動） */
  html.embedded-mode.font-size-large { font-size: 1.5em; }
  html.embedded-mode.font-size-large body { font-size: 1em !important; }
  body {
    background-color: #7a4e28;
    background-image: url("{{ '/wood-bg.png' | relative_url }}"), url("../wood-bg.png"), url("./wood-bg.png");
    background-repeat: repeat;
  }
  .site-header,
  .page-content,
  .site-footer {
    background: transparent;
  }
  .markdown-body {
    position: relative;
    overflow: hidden;
    background-color: #fff;
    background-image: repeating-linear-gradient(transparent, transparent 31px, #d8e8f8 31px, #d8e8f8 32px);
    background-position: 0 12px;
    border: 1px solid #d1d5da;
    border-radius: 0;
    padding: 16px;
  }
  .site-footer {
    border-top: 0;
    background: transparent;
    color: #fff;
  }
  .site-footer .wrapper {
    max-width: none;
    padding: 0.4rem 1rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
  }
  .site-footer .wrapper > :not(#supportFooterCopy):not(.env-switcher) {
    display: none;
  }
  .site-footer p { margin: 0; }
  .site-footer * {
    color: #fff;
  }
  #supportFooterCopy,
  #envSwitcher {
    color: #fff;
    text-align: center;
  }
  .env-switcher {
    margin: 0;
    font-size: 13px;
    line-height: 1.4;
    letter-spacing: 0.02em;
  }
  .env-switcher a {
    color: #fff;
    text-decoration: underline;
  }
  .env-switcher strong {
    font-weight: 700;
  }
</style>
<script>
  function detectDeployEnv(pathname) {
    // app 側（OuterBottomRow / IndexedDB）と同等の判定を、Jekyll 側でも単独で使えるよう重複して実装する。
    const segments = pathname.split('/').filter(Boolean);
    for (const segment of segments) {
      if (segment === 'v1' || segment === 'rc') {
        return segment;
      }
    }
    return 'v1';
  }

  function buildDeployUrl(targetEnv) {
    // app 側の URL 変換ロジックと似ているが、support ページでは
    // /support -> /{env}/support を補正する必要があるためここで分岐を持つ。
    const url = new URL(location.href);
    const segments = url.pathname.split('/');
    const envIndex = segments.findIndex((segment) => segment === 'v1' || segment === 'rc');
    if (envIndex >= 0) {
      segments[envIndex] = targetEnv;
    } else {
      const supportIndex = segments.findIndex((segment) => segment === 'support');
      if (supportIndex >= 0) {
        segments.splice(supportIndex, 0, targetEnv);
      } else {
        const insertIndex = segments[segments.length - 1] === '' ? segments.length - 1 : segments.length;
        segments.splice(insertIndex, 0, targetEnv, 'support');
      }
    }
    url.pathname = segments.join('/');
    return url.toString();
  }

  function appendEnvSwitcher() {
    if (new URLSearchParams(location.search).get('embedded') === '1') return;
    const container = document.querySelector('.site-footer .wrapper') || document.querySelector('main') || document.body;
    if (!container || document.getElementById('envSwitcher')) return;
    let copy = document.getElementById('supportFooterCopy');
    if (!copy) {
      copy = document.createElement('p');
      copy.id = 'supportFooterCopy';
      copy.textContent = '© 2026 goataka';
      container.append(copy);
    }
    const current = detectDeployEnv(location.pathname);
    const wrapper = document.createElement('div');
    wrapper.id = 'envSwitcher';
    wrapper.className = 'env-switcher';
    wrapper.innerHTML =
      '[ ' +
      (current === 'v1' ? '<strong>v1</strong>' : '<a href="' + buildDeployUrl('v1') + '">v1</a>') +
      ' | ' +
      (current === 'rc' ? '<strong>rc</strong>' : '<a href="' + buildDeployUrl('rc') + '">rc</a>') +
      ' ]';
    container.append(wrapper);
  }

  // ?embedded=1 が付与されているとき（クイズの解説 iframe として表示されるとき）、
  // <html> に embedded-mode クラスを付与してヘッダーを即座に非表示にする。
  // sandbox="allow-scripts"（allow-same-origin なし）の iframe 内では
  // window !== window.top がエラーになる場合があるため、このフラグのみで判定する。
  if (new URLSearchParams(location.search).get('embedded') === '1') {
    document.documentElement.classList.add('embedded-mode');
  }
  // クイズアプリからフォントサイズ変更メッセージを受け取り、html 要素にクラスを付与する
  // e.source === window.parent で送信元を親フレームに限定し、第三者からの不正変更を防ぐ
  window.addEventListener('message', function(e) {
    if (e.source !== window.parent) return;
    if (e.data && e.data.type === 'fontSizeChanged') {
      document.documentElement.classList.remove('font-size-medium', 'font-size-large');
      if (e.data.level === 'medium') {
        document.documentElement.classList.add('font-size-medium');
      } else if (e.data.level === 'large') {
        document.documentElement.classList.add('font-size-large');
      }
    }
  });
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', appendEnvSwitcher, { once: true });
  } else {
    appendEnvSwitcher();
  }
</script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  // Jekyll が生成する <pre><code class="language-mermaid"> を <pre class="mermaid"> に変換してから初期化する
  document.querySelectorAll('code.language-mermaid').forEach((el) => {
    const pre = document.createElement('pre');
    pre.className = 'mermaid';
    pre.textContent = el.textContent;
    el.parentElement.replaceWith(pre);
  });
  mermaid.initialize({ startOnLoad: true });
</script>
