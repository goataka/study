<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学習クイズ - Goataka Study</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./css/quiz.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="titleBtn" role="button" tabindex="0" class="title-btn" title="スタート画面へ戻る">学習クイズ</h1>
      <nav>
        <a href="../">🏠 ドリル一覧</a>
      </nav>
      <div class="header-user-area">
        <button id="headerUserName" class="header-user-name" title="名前を変更する（クリック）" aria-label="名前を変更する"></button>
        <div id="headerUserEdit" class="header-user-edit hidden">
          <input type="text" id="headerUserNameInput" class="header-user-name-input" maxlength="20" placeholder="名前を入力">
          <button id="headerUserNameSaveBtn" class="header-user-save-btn" aria-label="保存">✓</button>
        </div>
      </div>
    </header>

    <!-- スタート画面 -->
    <div id="startScreen" class="screen">
      <!-- 教科タブ -->
      <div class="subject-tabs" role="tablist" aria-label="教科を選択"></div>

      <!-- カテゴリ + クイズパネル（教科タブ選択時に表示）-->
      <div class="start-content-layout" id="subjectContent">
        <!-- カテゴリリスト -->
        <div class="category-panel">
          <div class="category-panel-header">
            <button id="hideLearnedBtn" class="hide-learned-btn" type="button" aria-pressed="true">✅ 学習済を非表示</button>
          </div>
          <div id="categoryList" class="category-list"></div>
        </div>

        <!-- 右パネル（クイズモード選択 / 実行記録をタブで切り替え）-->
        <div class="quiz-panel">
          <!-- インナータブ -->
          <div class="panel-tabs" role="tablist" aria-label="パネル切り替え">
            <button class="panel-tab active" id="panelTab-quiz" data-panel="quiz" role="tab" type="button" aria-selected="true" aria-controls="quizModePanel" tabindex="0">クイズモード選択</button>
            <button class="panel-tab" id="panelTab-history" data-panel="history" role="tab" type="button" aria-selected="false" aria-controls="historyContent" tabindex="-1">📊 実行記録</button>
          </div>
          <!-- クイズモード選択パネル -->
          <div id="quizModePanel" role="tabpanel" aria-labelledby="panelTab-quiz">
            <div class="question-count-section">
              <span class="question-count-label">問題数：</span>
              <div class="question-count-group">
                <label class="count-label"><input type="radio" name="questionCount" value="5"> 5問</label>
                <label class="count-label"><input type="radio" name="questionCount" value="10" checked> 10問</label>
                <label class="count-label"><input type="radio" name="questionCount" value="20"> 20問</label>
              </div>
            </div>
            <div class="button-group">
              <button id="startRandomBtn" class="primary-btn">ランダム</button>
              <button id="startPracticeBtn" class="primary-btn">練習</button>
              <button id="startRetryBtn" class="secondary-btn">間違えた問題だけ</button>
              <button id="markLearnedBtn" class="tertiary-btn" disabled>✅ 学習済みにする</button>
            </div>
            <div id="statsInfo" class="stats-info">読み込み中...</div>
            <button id="showQuestionListBtn" class="question-list-btn">📋 問題一覧</button>
          </div>

          <!-- 実行記録パネル -->
          <div id="historyContent" class="hidden" role="tabpanel" aria-labelledby="panelTab-history">
            <div id="historyList" class="history-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- クイズ画面 -->
    <div id="quizScreen" class="screen hidden">
      <div class="quiz-landscape-layout">
        <!-- 左列: 問題・選択肢・ナビゲーション -->
        <div class="quiz-main-col">
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div class="question-info">
            <span id="questionNumber"></span>
            <span id="topicName" class="topic-badge"></span>
            <a id="guideLink" class="guide-link hidden" target="_blank" rel="noopener noreferrer">📖 解説</a>
          </div>
          <div id="questionText" class="question-text"></div>
          <div id="choicesContainer" class="choices-container"></div>

          <div id="answerFeedback" class="answer-feedback hidden">
            <div class="feedback-content">
              <div id="feedbackResult" class="feedback-result"></div>
              <div id="feedbackExplanation" class="feedback-explanation"></div>
            </div>
          </div>
          <div class="navigation-buttons">
            <button id="prevBtn" class="nav-btn" disabled>前へ</button>
            <button id="nextBtn" class="nav-btn">次へ</button>
            <button id="submitBtn" class="submit-btn hidden">採点する</button>
          </div>
        </div>

        <!-- 右列: メモエリア -->
        <div class="quiz-notes-col">
          <div class="notes-area">
            <div class="notes-header">
              <span class="notes-title">📝 メモ（タッチペンで書けます）</span>
              <div class="notes-controls">
                <button id="clearNotesBtn" class="notes-btn" type="button" title="メモをクリア" aria-label="メモをクリア">🗑️</button>
                <button id="eraserBtn" class="notes-btn" type="button" title="消しゴム" aria-label="消しゴム">🧹</button>
                <select id="penSizeSelect" class="pen-size-select" title="線の太さ" aria-label="線の太さ">
                  <option value="2" selected>普通</option>
                  <option value="4">太い</option>
                  <option value="6">極太</option>
                </select>
                <select id="penColorSelect" class="pen-color-select" title="色" aria-label="線の色">
                  <option value="#000000">黒</option>
                  <option value="#0366d6">青</option>
                  <option value="#dc3545">赤</option>
                  <option value="#28a745">緑</option>
                </select>
              </div>
            </div>
            <canvas id="notesCanvas" class="notes-canvas"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- 結果画面 -->
    <div id="resultScreen" class="screen hidden">
      <h2>クイズ結果</h2>
      <div id="scoreDisplay" class="score-display"></div>
      <div id="resultDetails" class="result-details"></div>
      <div class="button-group">
        <button id="retryAllBtn" class="primary-btn">もう一度</button>
        <button id="retryWrongBtn" class="secondary-btn">間違えた問題だけ</button>
        <button id="backToStartBtn" class="tertiary-btn">スタート画面に戻る</button>
      </div>
    </div>
  </div>

  <!-- 問題一覧モーダル -->
  <div id="questionListModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="questionListTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="questionListTitle" class="modal-title"></h2>
        <button id="closeQuestionListBtn" class="modal-close-btn" aria-label="閉じる">✕</button>
      </div>
      <div id="questionListBody" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="./src/presentation/quizApp.ts"></script>
</body>
</html>
