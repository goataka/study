<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学習アプリ</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./css/quiz.css">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0366d6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="学習アプリ">
  <meta property="og:title" content="学習アプリ">
  <meta property="og:description" content="小中高向け学習アプリ">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="学習アプリ">
  <meta property="og:image" content="https://goataka.github.io/study/ogp.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:secure_url" content="https://goataka.github.io/study/ogp.png">
  <meta property="og:url" content="https://goataka.github.io/study/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://goataka.github.io/study/ogp.png">
  <meta name="twitter:title" content="学習アプリ">
  <meta name="twitter:description" content="小中高向け学習アプリ">
  <script>
    /* 1920×1080 を基準として画面全体にフィットするようズームスケーリングを適用する */
    /* clientWidth/clientHeight を使用してスクロールバーを除いた表示領域を取得する */
    /* モバイル（横幅 768px 未満）では zoom を無効にして CSS レスポンシブに任せる */
    (function () {
      function applyZoom() {
        var el = document.documentElement;
        var w = el.clientWidth;
        if (w < 768) {
          el.style.zoom = '';
          return;
        }
        el.style.zoom = Math.min(w / 1920, el.clientHeight / 1080);
      }
      applyZoom();
      window.addEventListener('resize', applyZoom);
    })();
  </script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-title-area">
        <h1 id="titleBtn" role="button" tabindex="0" class="title-btn" title="スタート画面へ戻る"><img src="./favicon.svg" class="header-logo" alt="" aria-hidden="true"> 学習アプリ</h1>
        <span class="header-grade-label">小・中・高</span>
      </div>
      <div class="header-center-area">
        <div class="header-user-area">
          <button id="headerUserName" class="header-user-name" type="button" title="名前を編集する" aria-label="名前を編集する"></button>
          <div id="headerUserEdit" class="header-user-edit hidden">
            <input type="text" id="headerUserNameInput" class="header-user-name-input" maxlength="20" placeholder="名前を入力">
            <button id="headerUserNameSaveBtn" class="header-user-save-btn" aria-label="保存">✓</button>
          </div>
        </div>
        <span id="headerTodayDate" class="header-today-date"></span>
        <button id="reloadBtn" class="reload-btn" type="button" title="ページを更新する" aria-label="ページを更新する">🔄</button>
        <div id="fontSizeBtns" class="font-size-btns" role="group" aria-label="文字サイズ">
          <span class="font-size-icon" aria-hidden="true">A</span>
          <button class="font-size-btn active" data-size="small" aria-pressed="true" title="文字サイズ：小">小</button>
          <button class="font-size-btn" data-size="medium" aria-pressed="false" title="文字サイズ：中">中</button>
          <button class="font-size-btn" data-size="large" aria-pressed="false" title="文字サイズ：大">大</button>
        </div>
        <a id="supportBtn" class="support-btn" href="./support/" target="_blank" rel="noopener noreferrer" title="サポートページを開く" aria-label="サポートページを開く">❔</a>
        <a id="githubBtn" class="github-btn" href="https://github.com/goataka/study" target="_blank" rel="noopener noreferrer" title="GitHubリポジトリを開く" aria-label="GitHubリポジトリを開く">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
      </div>
      <div class="header-right-area">
        <button id="adminMenuBtn" class="admin-menu-header-btn" type="button" title="メニュー" aria-label="メニューを開く">⚙️</button>
      </div>
    </header>

    <!-- スタート画面 -->
    <div id="startScreen" class="screen">
      <!-- 教科タブ -->
      <div class="subject-tabs" role="tablist" aria-label="教科を選択"></div>

      <!-- カテゴリ + クイズパネル（教科タブ選択時に表示）-->
      <div class="start-content-layout" id="subjectContent">
        <!-- カテゴリリスト -->
        <div class="category-panel">
          <div class="category-panel-header">
            <span id="categoryListTitle" class="category-list-title">📚 単元一覧</span>
            <div class="category-status-filter" role="group" aria-label="学習状態フィルター">
              <span class="category-status-filter-label">学習状況：</span>
              <button id="filterStatusAll" class="category-status-filter-btn active" type="button" aria-pressed="true">すべて</button>
              <button id="filterStatusUnlearned" class="category-status-filter-btn" type="button" aria-pressed="false">未学習</button>
              <button id="filterStatusStudying" class="category-status-filter-btn" type="button" aria-pressed="false">学習中</button>
              <button id="filterStatusLearned" class="category-status-filter-btn" type="button" aria-pressed="false">学習済</button>
            </div>
            <span id="allSubjectPanelTitle" class="all-subject-panel-title hidden">✨ おすすめ単元</span>
          </div>
          <!-- 総合タブの日付ナビゲーション（おすすめ単元の上） -->
          <div id="overallDateNav" class="activity-date-nav hidden">
            <span id="activityDateDisplay" class="activity-date-display"></span>
          </div>
          <div id="categoryControls" class="category-controls"></div>
          <div id="categoryList" class="category-list"></div>
        </div>

        <!-- 右パネル（クイズモード選択 / 履歴をタブで切り替え）-->
        <div class="quiz-panel">
          <!-- スマホ用：単元一覧に戻るボタン -->
          <button id="mobileBackBtn" class="mobile-back-btn" type="button" aria-label="単元一覧に戻る">← 単元一覧</button>
          <!-- 選択中の単元情報（単元・カテゴリ選択時に表示） -->
          <div id="selectedUnitInfo" class="selected-unit-info hidden"></div>
          <!-- インナータブ -->
          <div class="panel-tabs" role="tablist" aria-label="パネル切り替え">
            <button class="panel-tab" id="panelTab-guide" data-panel="guide" role="tab" type="button" aria-selected="false" aria-controls="guideContent" tabindex="-1">📖 解説</button>
            <button class="panel-tab active" id="panelTab-quiz" data-panel="quiz" role="tab" type="button" aria-selected="true" aria-controls="quizModePanel" tabindex="0">✅ 確認</button>
            <button class="panel-tab" id="panelTab-questions" data-panel="questions" role="tab" type="button" aria-selected="false" aria-controls="questionListContent" tabindex="-1">📋 問題</button>
            <button class="panel-tab" id="panelTab-history" data-panel="history" role="tab" type="button" aria-selected="false" aria-controls="historyContent" tabindex="-1">📊 履歴</button>
          </div>
          <!-- クイズモード選択パネル -->
          <div id="quizModePanel" role="tabpanel" aria-labelledby="panelTab-quiz">
            <div id="statsInfo" class="stats-info">読み込み中...</div>
            <div class="button-group">
              <button id="startRandomBtn" class="primary-btn">スタート</button>
            </div>
            <div class="question-count-section">
              <span class="question-count-label">問題数：</span>
              <div class="question-count-group">
                <label class="count-label"><input type="radio" name="questionCount" value="5"> 5問</label>
                <label class="count-label"><input type="radio" name="questionCount" value="10" checked> 10問</label>
                <label class="count-label"><input type="radio" name="questionCount" value="20"> 20問</label>
              </div>
            </div>
            <div class="quiz-order-section">
              <span class="quiz-order-label">並び順：</span>
              <div class="quiz-order-group">
                <label class="order-label"><input type="radio" name="quizOrder" value="straight"> ストレート</label>
                <label class="order-label"><input type="radio" name="quizOrder" value="random" checked> ランダム</label>
              </div>
            </div>
            <div class="quiz-learned-section">
              <span class="quiz-order-label">学習済：</span>
              <div class="quiz-order-group">
                <label class="order-label"><input type="radio" name="quizLearned" value="exclude" checked> 含めない</label>
                <label class="order-label"><input type="radio" name="quizLearned" value="include"> 含める</label>
              </div>
            </div>
            <div class="mark-learned-section">
              <button id="markLearnedBtn" class="mark-learned-btn" disabled>✅ 学習済みにする</button>
            </div>
          </div>

          <!-- 解説パネル -->
          <div id="guideContent" class="hidden" role="tabpanel" aria-labelledby="panelTab-guide">
            <div id="guidePanelFrame" class="guide-frame"></div>
            <p id="guideNoContent" class="guide-no-content hidden">このカテゴリには解説がありません。</p>
          </div>

          <!-- 履歴パネル -->
          <div id="historyContent" class="hidden" role="tabpanel" aria-labelledby="panelTab-history">
            <div id="historyList" class="history-list"></div>
          </div>

          <!-- 問題一覧パネル -->
          <div id="questionListContent" class="hidden" role="tabpanel" aria-labelledby="panelTab-questions">
            <div class="question-list-filter-bar">
              <button id="questionListFilterAll" class="question-list-filter-btn active" type="button">すべて</button>
              <button id="questionListFilterUnlearned" class="question-list-filter-btn" type="button">未学習</button>
              <button id="questionListFilterLearned" class="question-list-filter-btn" type="button">学習済</button>
              <span id="questionListFilterCount" class="question-list-filter-count"></span>
            </div>
            <div id="questionListBody" class="question-list-panel-body"></div>
          </div>

          <!-- 総合タブ専用サマリパネル -->
          <div id="overallSummaryPanel" class="hidden overall-summary-panel" role="region" aria-label="活動サマリ">
            <!-- タブバー（総合タブ専用） -->
            <div class="panel-tabs overall-panel-tabs" role="tablist" aria-label="概要パネル切り替え">
              <button class="panel-tab active" id="overallTab-learned" data-overall-panel="learned" role="tab" type="button" aria-selected="true">🎓 学習済</button>
              <button class="panel-tab" id="overallTab-share" data-overall-panel="share" role="tab" type="button" aria-selected="false">📤 シェア</button>
            </div>
            <!-- 学習済み活動パネル -->
            <div id="overallLearnedPanel" class="overall-activity-panel">
              <!-- 活動日付表示 -->
              <div class="overall-activity-date-row">
                <span id="overallActivityDateLabel" class="overall-activity-date"></span>
              </div>
              <!-- 活動一覧（履歴形式） -->
              <div id="todayActivityContent" class="history-list overall-today-list"></div>
            </div>
            <!-- シェアパネル -->
            <div id="overallSharePanel" class="overall-activity-panel hidden">
              <!-- 活動サマリ（SNS共有用） -->
              <div id="shareSummaryText" class="share-summary-text"></div>
              <div class="share-actions-row">
                <button id="copySummaryBtn" class="share-copy-btn" type="button">📋 コピー</button>
                <button id="openShareUrlBtn" class="share-url-open-btn hidden" type="button">📤 共有</button>
                <div class="share-url-inline">
                  <button id="shareUrlDisplayBtn" class="share-url-display-btn" type="button" title="URLを編集" aria-expanded="false">URLを設定</button>
                  <div id="shareUrlEditArea" class="share-url-edit-area hidden">
                    <input type="url" id="shareUrlInput" class="share-url-input" aria-label="共有URL" placeholder="共有URLを入力（例: https://twitter.com）">
                    <button id="saveShareUrlBtn" class="share-url-save-btn" type="button" aria-label="保存">✓</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- クイズ画面 -->
    <div id="quizScreen" class="screen hidden">
      <div class="quiz-landscape-layout">
        <!-- 左列: 問題・選択肢・ナビゲーション -->
        <div class="quiz-main-col">
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div class="question-info">
            <span id="questionNumber"></span>
            <span id="topicName" class="topic-badge"></span>
            <button id="cancelQuizBtn" class="cancel-quiz-btn" type="button" title="中止する" aria-label="クイズを中止する">✕</button>
          </div>
          <div id="questionText" class="question-text"></div>
          <div id="choicesContainer" class="choices-container"></div>

          <div id="answerFeedback" class="answer-feedback hidden">
            <div class="feedback-content">
              <div id="feedbackResult" class="feedback-result"></div>
              <div id="feedbackExplanation" class="feedback-explanation"></div>
            </div>
          </div>
          <div class="navigation-buttons">
            <button id="prevBtn" class="nav-btn" disabled>前へ</button>
            <button id="nextBtn" class="nav-btn">次へ</button>
            <button id="submitBtn" class="submit-btn hidden">採点する</button>
          </div>
        </div>

        <!-- 右列: メモエリア -->
        <div class="quiz-notes-col">
          <div class="notes-area">
            <!-- メモエリア -->
            <div id="notesMemoContent">
              <div class="notes-header">
                <span id="notesTitle" class="notes-title">タッチペンで書けます</span>
                <div class="notes-controls">
                  <button id="clearNotesBtn" class="notes-btn" type="button" title="メモをクリア" aria-label="メモをクリア">🗑️</button>
                  <button id="eraserBtn" class="notes-btn" type="button" title="消しゴム" aria-label="消しゴム"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true"><path d="M8.086 2.207a2 2 0 0 1 2.828 0l3.879 3.879a2 2 0 0 1 0 2.828l-5.5 5.5A2 2 0 0 1 7.879 15H5.12a2 2 0 0 1-1.414-.586l-2.5-2.5a2 2 0 0 1 0-2.828l6.879-6.879zm.66 11.34L3.453 8.254 1.914 9.793a1 1 0 0 0 0 1.414l2.5 2.5a1 1 0 0 0 .707.293H7.88a1 1 0 0 0 .707-.293l.16-.16zm.255-8.172 4.893 4.894-2.276 2.035-5.022-5.022 2.405-1.907z"/></svg></button>
                  <select id="penSizeSelect" class="pen-size-select" title="線の太さ" aria-label="線の太さ">
                    <option value="2" selected>普通</option>
                    <option value="4">太い</option>
                    <option value="6">極太</option>
                  </select>
                  <select id="penColorSelect" class="pen-color-select" title="色" aria-label="線の色">
                    <option value="#000000">黒</option>
                    <option value="#0366d6">青</option>
                    <option value="#dc3545">赤</option>
                    <option value="#28a745">緑</option>
                  </select>
                </div>
              </div>
              <canvas id="notesCanvas" class="notes-canvas"></canvas>

              <!-- KanjiCanvas入力エリア（text-input問題のみ表示） -->
              <div id="kanjiInputArea" class="hidden">
                <div class="kanji-input-header">
                  <span class="kanji-input-label">1文字ずつ書いてください</span>
                </div>
                <div class="kanji-input-body">
                  <div class="kanji-canvas-wrapper">
                    <canvas id="kanjiCanvas" class="kanji-canvas" width="400" height="400" data-stroke-numbers="false"></canvas>
                  </div>
                  <div class="kanji-candidates-area">
                    <div id="kanjiCandidateList" class="kanji-candidate-list"></div>
                    <div class="kanji-input-controls">
                      <button id="kanjiDeleteLastBtn" class="kanji-ctrl-btn" type="button" title="最後の1画を消す" aria-label="最後の1画を消す">↩</button>
                      <button id="kanjiEraseBtn" class="kanji-ctrl-btn" type="button" title="全部消す" aria-label="全部消す">🗑️</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- 結果画面 -->
    <div id="resultScreen" class="screen hidden">
      <h2>確認結果</h2>
      <div id="resultUnitName" class="result-unit-name hidden"></div>
      <div id="resultMessage" class="result-message"></div>
      <div id="scoreDisplay" class="score-display"></div>
      <div id="resultDetails" class="result-details"></div>
      <div class="button-group">
        <button id="retryAllBtn" class="primary-btn">もう一度</button>
        <button id="backToStartBtn" class="tertiary-btn">スタート画面に戻る</button>
      </div>
    </div>

    <footer class="app-footer">
      <span class="app-footer-copyright">&copy; 2026 goataka</span>
    </footer>
  </div>

  <!-- 確認ダイアログ -->
  <div id="confirmDialog" class="confirm-dialog-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="confirmDialogMessage">
    <div class="confirm-dialog">
      <p id="confirmDialogMessage" class="confirm-dialog-message"></p>
      <div class="confirm-dialog-buttons">
        <button id="confirmDialogOk" class="primary-btn">OK</button>
        <button id="confirmDialogCancel" class="secondary-btn">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- KanjiCanvas: 手書き漢字認識ライブラリ（text-input問題で使用） -->
  <script src="./vendor/kanji-canvas.min.js"></script>
  <!-- ref-patterns.js（6MB）と hiragana-patterns.js（ひらがな）は初回 text-input 問題表示時に quizApp.ts が動的ロードする -->
  <script type="module" src="./src/presentation/quizApp.ts"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
