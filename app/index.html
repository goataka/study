    <script>
      /* 1920×1080 を基準として画面全体にフィットするようスケーリングを適用する */
      /* window.innerWidth/innerHeight を使用して表示領域を取得する */
      /* モバイル（横幅 768px 未満）ではスケーリングを無効にして CSS レスポンシブに任せる */
      (function () {
        function applyScale() {
          var el = document.documentElement;
          var w = window.innerWidth;
          var h = window.innerHeight;
          if (w < 768) {
            el.style.transform = "";
            el.style.transformOrigin = "";
            el.style.width = "";
            el.style.height = "";
            el.style.overflow = "";
            return;
          }
          var scale = Math.min(w / 1920, h / 1080);
          el.style.transformOrigin = "top left";
          el.style.transform = "scale(" + scale + ")";
          el.style.width = 100 / scale + "%";
          el.style.height = 100 / scale + "%";
          el.style.overflow = "hidden";
        }
        applyScale();
        window.addEventListener("resize", applyScale);
      })();
    </script>
  </head>
  <body>
    <!-- React マウントポイント。ボディマークアップ全体は src/presentation/App.tsx
         配下の React コンポーネントが描画する。 -->
    <div id="root"></div>

    <!-- KanjiCanvas: 手書き漢字認識ライブラリ（text-input問題で使用） -->
    <script src="./vendor/kanji-canvas.min.js"></script>
    <!-- ref-patterns.js（6MB）と hiragana-patterns.js（ひらがな）は初回 text-input 問題表示時に quizApp.ts が動的ロードする -->
    <script type="module" src="./src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js");
        });
      }
    </script>
  </body>
