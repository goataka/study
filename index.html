<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goataka Study - 子供向け学習ドリル</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans CJK JP", sans-serif;
      line-height: 1.6;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      color: #333;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #666;
      font-size: 1.1rem;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .link-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 15px;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
      display: block;
    }
    .link-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .link-card h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }
    .link-card p {
      font-size: 1rem;
      opacity: 0.9;
    }
    .quiz-card {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    .quiz-card:hover {
      box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Goataka Study</h1>
    <p class="subtitle">子供向け学習ドリル</p>

    <div class="links">
      <a href="contents/" class="link-card">
        <h2>📖 学習ドリル一覧</h2>
        <p>英語ドリル・数学ドリル（小学校〜高校）</p>
      </a>

      <a href="quiz/" class="link-card quiz-card">
        <h2>🎯 学習クイズ</h2>
        <p>4択クイズ形式で楽しく学習</p>
      </a>
    </div>
  </div>
</body>
</html>
