pre-commit:
  commands:
    unstage-unchanged-png:
      run: bash app/scripts/unstage-unchanged-png.sh
    lint-and-format:
      # ESLint・Prettier で自動チェック（高速）
      run: npm run lint && npm run format:check
      root: app/
    build-and-test:
      # E2E は時間がかかるため pre-push に移動した。
      # pre-commit では高速なビルドと単体テストのみ実行する。
      run: npm run build && npm run test
      root: app/
    markdownlint:
      run: npx --yes markdownlint-cli --fix "**/*.md" --ignore node_modules --ignore app/node_modules 2>/dev/null; npx --yes markdownlint-cli "**/*.md" --ignore node_modules --ignore app/node_modules

# pre-push は core.hooksPath が上書きされた環境（Copilot サンドボックス等）で
# pre-commit フックが実行されない場合の安全網として機能する。
# git push 前に再度ビルド・テスト・E2E・VRスナップショット確認を実行することで、
# CI が失敗するコードのプッシュを防ぐ。
pre-push:
  piped: true
  commands:
    build-and-test:
      run: npm run build && npm run test && npm run test:e2e
      root: app/
    update-vr-snapshots:
      run: bash scripts/pre-push-vr-check.sh
      root: app/
