name: Release App Artifact

on:
  pull_request:
    branches: [main]
    types: [closed]

env:
  NODE_VERSION: "22"

permissions:
  contents: write

jobs:
  build-and-release:
    name: 本番用リリース作成
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'staging'
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Viteビルド
        run: pnpm run build
        working-directory: app

      - name: リリース成果物を圧縮
        run: |
          cd app/dist
          zip -qr /tmp/app-dist.zip .

      - name: 次の v1 タグ名を決定
        id: next-tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          LATEST_V1_TAG="$(
            gh release list --limit 1000 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[].tagName' \
              | grep -E '^v1\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n1 || true
          )"

          if [ -z "${LATEST_V1_TAG}" ]; then
            NEXT_TAG="v1.0.0"
          else
            CURRENT_MINOR="$(echo "${LATEST_V1_TAG}" | sed -E 's/^v1\.([0-9]+)\.[0-9]+$/\1/')"
            NEXT_TAG="v1.$((CURRENT_MINOR + 1)).0"
          fi

          echo "tag_name=${NEXT_TAG}" >> "${GITHUB_OUTPUT}"

      - name: GitHub Release を作成
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.next-tag.outputs.tag_name }}
          name: ${{ steps.next-tag.outputs.tag_name }}
          target_commitish: main
          generate_release_notes: true
          files: /tmp/app-dist.zip
