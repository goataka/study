# mainブランチへのPRマージ後に、マージされたDiffをCopilotエージェントにレビューさせるワークフロー
# 問題が見つかった場合、Copilotが個別のIssueを作成する

name: マージ後コードレビュー

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  review-merged-code:
    name: マージされたコードをCopilotにレビュー依頼
    runs-on: ubuntu-latest
    # マージされたPRのみ、かつ同一リポジトリからのPRのみ実行（fork対策）
    if: >-
      ${{
        github.event.pull_request.merged == true &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    permissions:
      contents: read
      issues: write
      pull-requests: read
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: マージDiffの取得
        id: get-diff
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          DIFF_FILE="${RUNNER_TEMP}/merge-diff.txt"

          # GitHub APIのPR diffエンドポイントを利用して差分を取得する
          gh api \
            -H "Accept: application/vnd.github.diff" \
            "repos/${GH_REPO}/pulls/${PR_NUMBER}" > "$DIFF_FILE"

          DIFF_SIZE=$(wc -c < "$DIFF_FILE")
          echo "::notice::差分サイズ: ${DIFF_SIZE} bytes"

          # Issueボディのサイズ制限（65,536文字）を考慮して行単位で切り詰める
          # （head -c はマルチバイト文字の途中で切れる可能性があるため行単位を使用）
          if [ "$DIFF_SIZE" -gt 50000 ]; then
            # 1行あたり平均100バイトと見積もり、50,000バイト相当の行数を保持する
            AVG_BYTES_PER_LINE=100
            KEEP_LINES=$(( 50000 / AVG_BYTES_PER_LINE ))
            head -n "$KEEP_LINES" "$DIFF_FILE" > "${RUNNER_TEMP}/merge-diff-trunc.txt"
            printf '\n\n_... (差分が長いため省略されました。完全な差分はPR #%s を参照してください)_\n' "${PR_NUMBER}" >> "${RUNNER_TEMP}/merge-diff-trunc.txt"
            mv "${RUNNER_TEMP}/merge-diff-trunc.txt" "$DIFF_FILE"
            echo "::notice::差分が大きいため${KEEP_LINES}行に切り詰めました"
          fi

      - name: レビューIssueの作成とCopilotへの依頼
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COPILOT_TOKEN: ${{ secrets.COPILOT_CLASSIC }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "${MERGE_COMMIT_SHA}" ]; then
            echo "::error::MERGE_COMMIT_SHA が空です"
            exit 1
          fi

          COMMIT_SHORT="${MERGE_COMMIT_SHA:0:7}"
          DIFF_FILE="${RUNNER_TEMP}/merge-diff.txt"
          BODY_FILE="${RUNNER_TEMP}/review-issue-body.txt"

          # チルダフェンス（~~~~diff）を使用することで、差分内のバッククォートによる
          # Markdownフォーマット崩れを防ぐ（GitHub Markdown はチルダフェンスをサポートする）
          {
            printf '@copilot mainブランチにマージされたコードをレビューしてください。\n\n'
            printf 'バグ・セキュリティリスク・設計の問題・パフォーマンスの問題など、改善が必要な点を発見した場合は、各問題について個別のIssueを作成してください。\n'
            printf '問題が見つからない場合は、このIssueに「問題なし」とコメントしてクローズしてください。\n\n'
            printf '## マージ情報\n\n'
            printf '- PR: #%s %s\n' "${PR_NUMBER}" "${PR_TITLE}"
            printf '- マージコミット: `%s`\n' "${COMMIT_SHORT}"
            printf '- Actions実行: %s\n\n' "${RUN_URL}"
            printf '## 変更差分\n\n<details>\n<summary>差分を展開（クリックして表示）</summary>\n\n~~~~diff\n'
            cat "$DIFF_FILE"
            printf '\n~~~~\n\n</details>\n'
          } > "$BODY_FILE"

          ISSUE_TITLE="[コードレビュー] PR #${PR_NUMBER}: ${PR_TITLE}"

          # まずIssueを作成し、次にCopilotをアサインする（2ステップに分けて重複作成を防ぐ）
          NEW_ISSUE_URL=$(gh issue create \
            --title "${ISSUE_TITLE}" \
            --body-file "$BODY_FILE")

          echo "::notice::レビューIssueを作成しました: ${NEW_ISSUE_URL}"
          # URLの末尾パスセグメントからIssue番号を抽出する（例: .../issues/123 → 123）
          NEW_ISSUE_NUMBER=$(echo "${NEW_ISSUE_URL}" | awk -F'/' '{print $NF}' | grep -E '^[0-9]+$')

          if [ -z "${NEW_ISSUE_NUMBER}" ]; then
            echo "::error::IssueのURLからIssue番号を抽出できませんでした: ${NEW_ISSUE_URL}"
            exit 1
          fi

          if GH_TOKEN="${COPILOT_TOKEN:-${GH_TOKEN}}" gh issue edit "${NEW_ISSUE_NUMBER}" --add-assignee "@copilot"; then
            echo "::notice::Issue #${NEW_ISSUE_NUMBER} にCopilotをアサインしました"
          else
            echo "::warning::CopilotのアサインができませんでしたがIssueは作成済みです: #${NEW_ISSUE_NUMBER}"
          fi
