name: Sandbox

on:
  workflow_dispatch:


jobs:
  sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot & MCP Server
        run: |
          npm install -g @github/copilot
          npm install -g @modelcontextprotocol/server-github

      - name: Run Copilot Agent Task
        env:
          # Copilotの認証と推論に使用
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          # MCPサーバーがGitHubを操作するために使用
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.COPILOT_CLASSIC }}
        run: |
          copilot -p \
            "goataka/studyのmainブランチのREADMにある一覧の文字をなくすPRを作成するエージェントセッションを作成して。"
            --autopilot