name: Sandbox

on:
  workflow_dispatch:

jobs:
  fix-error:
    name: Copilotエージェントタスクを作成
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Copilotエージェントタスクを作成
        shell: bash
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_CLASSIC }}
        run: |
          set -euo pipefail
          echo "${COPILOT_TOKEN}" | gh auth login --with-token --hostname github.com
          
          gh auth status --hostname github.com
          
          export GH_TOKEN="${COPILOT_TOKEN}"

          TASK_FILE=$(mktemp)
          echo "モデル名を教えて" >>"$TASK_FILE"
          
          gh agent-task create \
            --base "main" \
            --repo "${{ github.repository }}" \
            -F "$TASK_FILE"

          # 一時ファイルを削除
          rm -f "$TASK_FILE"