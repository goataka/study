name: Build App CI Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/docker/app-ci/Dockerfile"
      - ".github/workflows/build-app-ci-image.yml"
  pull_request:
    paths:
      - ".github/docker/app-ci/Dockerfile"
      - ".github/workflows/build-app-ci-image.yml"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/study-app-ci

jobs:
  build-and-push:
    name: アプリCI用イメージのビルド
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v6

      - name: Buildx のセットアップ
        uses: docker/setup-buildx-action@v3

      - name: GHCR にログイン
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker メタデータ生成
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: イメージのビルドとプッシュ
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/app-ci/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
