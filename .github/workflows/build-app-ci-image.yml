name: Build App CI Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/docker/app-ci/Dockerfile"
      - ".github/workflows/build-app-ci-image.yml"
  pull_request:
    paths:
      - ".github/docker/app-ci/Dockerfile"
      - ".github/workflows/build-app-ci-image.yml"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/study-app-ci
  PLAYWRIGHT_VERSION: "1.59.1"
  PLAYWRIGHT_BDD_VERSION: "8.5.0"

jobs:
  build-and-push:
    name: アプリCI用イメージのビルド
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Buildx のセットアップ
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: GHCR にログイン
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker メタデータ生成
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          # main ブランチから配布する共通実行環境として、latest タグのみを公開する
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: イメージのビルドとプッシュ
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .github/docker/app-ci
          file: .github/docker/app-ci/Dockerfile
          build-args: |
            PLAYWRIGHT_VERSION=${{ env.PLAYWRIGHT_VERSION }}
            PLAYWRIGHT_BDD_VERSION=${{ env.PLAYWRIGHT_BDD_VERSION }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
