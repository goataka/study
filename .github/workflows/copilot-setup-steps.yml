name: "Copilot Setup Steps"

# Automatically validate setup steps when changed, and allow manual testing
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` to be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: quiz/package-lock.json

      - name: Install quiz dependencies
        run: cd quiz && npm ci

      # テストを実行してエビデンスファイルを生成する。
      # AIエージェントはこのステップが成功してから作業を開始する。
      # quiz フォルダを変更した場合は必ず npm run test:evidence を実行し、
      # TEST_EVIDENCE.md をコミットに含めること。
      - name: Run tests with evidence generation
        run: cd quiz && npm run test:evidence
