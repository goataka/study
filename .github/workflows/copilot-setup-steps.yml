name: "Copilot Setup Steps"

# Automatically validate setup steps when changed, and allow manual testing
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` to be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: quiz/package-lock.json

      - name: Install quiz dependencies
        run: cd quiz && npm ci

      # Run tests immediately so Copilot can validate changes before completing work
      - name: Run tests
        run: cd quiz && npm test
