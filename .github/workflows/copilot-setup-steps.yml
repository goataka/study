name: "Copilot Setup Steps"

# copilot-setup-steps.yml の変更時に自動実行して動作確認できるようにする
# また Actions タブから手動実行も可能
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Copilot が認識するためにジョブ名は copilot-setup-steps にする
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # GHCR からイメージを取得するために必要

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 日本語UTF-8ロケールのセットアップ
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y locales
          sudo locale-gen ja_JP.UTF-8
          sudo update-locale LANG=ja_JP.UTF-8 LC_ALL=ja_JP.UTF-8
          {
            echo "LANG=ja_JP.UTF-8"
            echo "LC_ALL=ja_JP.UTF-8"
            echo "LANGUAGE=ja_JP:ja"
          } >> "$GITHUB_ENV"

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz

      - name: Playwright ブラウザのキャッシュ設定
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-chromium-

      - name: Playwright OS依存ライブラリのインストール（キャッシュミス時のみ）
        # ブラウザバイナリがキャッシュにない場合のみ OS 依存ライブラリをインストールする
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/app
        run: pnpm exec playwright install-deps chromium

      - name: Playwright ブラウザのインストール（E2E/VR用）
        # pre-push フックで test:e2e / test:e2e:vr を実行するために事前インストールが必要
        # キャッシュヒット時はバイナリ配置のみ（OS依存ライブラリは上のステップでスキップ）
        working-directory: ${{ github.workspace }}/app
        run: pnpm exec playwright install chromium

      - name: lefthook を PATH に追加
        # Copilot セッション中に lefthook コマンドを使えるようにする
        run: echo "$GITHUB_WORKSPACE/app/node_modules/.bin" >> "$GITHUB_PATH"

      - name: lefthook フックを copilot-hooks にインストール
        # Copilot agent は core.hooksPath を copilot-hooks に設定するため、
        # 同じパスに lefthook のフックをインストールしておく
        # --force で hooksPath 設定済みの場合でも上書きインストールする
        run: |
          git config core.hooksPath copilot-hooks
          lefthook install --force
