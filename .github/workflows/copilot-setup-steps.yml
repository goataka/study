name: "Copilot Setup Steps"

# copilot-setup-steps.yml の変更時に自動実行して動作確認できるようにする
# また Actions タブから手動実行も可能
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Copilot が認識するためにジョブ名は copilot-setup-steps にする
  copilot-setup-steps:
    runs-on: ubuntu-latest
    container:
      # Playwright + Chromium などを含む既存のCI用イメージを流用する
      # GHA の container.image では env を参照せず、GHCR イメージを直接指定する
      image: ghcr.io/goataka/study-app-ci:latest

    permissions:
      contents: read
      packages: read # GHCR からイメージを取得するために必要

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v6

      - name: Git safe directory の設定（コンテナ内UID不一致対応）
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz

      - name: lefthook を PATH に追加
        # Copilot セッション中に lefthook コマンドを使えるようにする
        run: echo "$GITHUB_WORKSPACE/app/node_modules/.bin" >> "$GITHUB_PATH"

      - name: lefthook フックを copilot-hooks にインストール
        # Copilot agent は core.hooksPath を copilot-hooks に設定するため、
        # 同じパスに lefthook のフックをインストールしておく
        # --force で hooksPath 設定済みの場合でも上書きインストールする
        run: |
          git config core.hooksPath copilot-hooks
          lefthook install --force
