name: ガイド内容チェック（Copilotエージェント）

# staging から main へのリリースPR作成時に、
# Copilotエージェントを使ってガイドの内容が現在の仕様に合致しているかチェックする

on:
  pull_request:
    branches: [main]
    types: [opened]

# COPILOT_CLASSIC シークレットは Copilot エージェントをアサインするために推奨（未設定の場合は GITHUB_TOKEN にフォールバック）

permissions:
  contents: read
  issues: write

jobs:
  check-guide:
    name: ガイド内容チェックをCopilotに依頼
    if: github.event.pull_request.head.ref == 'staging'
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: ガイド内容チェックをCopilotに依頼
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.COPILOT_CLASSIC || secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const commitSha = pr.head.sha.slice(0, 7);
            const runUrl = process.env.RUN_URL;

            const issueTitle = `[ガイド内容チェック] リリースPR #${pr.number} 作成 (${commitSha})`;
            const issueBody = `@copilot 以下のチェックを実施してください。

## 依頼内容

\`staging\` から \`main\` へのリリースPR（#${pr.number}, コミット: ${commitSha}）が作成されました。
\`support/\` 配下のガイドファイル全体の内容が、現在の仕様（\`.github/copilot-instructions.md\` に記載のルール）に合致しているかチェックし、問題があれば修正してください。

## チェック観点

- マークダウン記法ルール（見出し後の空行、バッククォート強調、引用記法の用途など）
- 各ドリルのガイドファイル構成ルール（\`guide.md\` の構成順序、必須セクションの有無）
- 単元名の絵文字ルール（数学ドリル）
- カタカナ表記ルール（英語ドリル）
- テーブルの回答スペースのパディングルール（全角スペース12個）
- \`support/README.md\` のリンクテーブルがすべてのドリルを網羅しているか
- その他 \`.github/copilot-instructions.md\` に記載のコンテンツルール

## 参考

- Actions実行ログ: ${runUrl}
`;

            const { data: issue } = await github.rest.issues.create({
              owner,
              repo,
              title: issueTitle,
              body: issueBody,
            });

            core.notice(`ガイド内容チェックIssueを作成しました: ${issue.html_url}`);

            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: issue.number,
                assignees: ["copilot"],
              });
              core.notice(`Issue #${issue.number} にCopilotをアサインしました`);
            } catch (e) {
              core.warning(`Copilotのアサインに失敗しましたが、Issueは作成済みです: #${issue.number}`);
            }
