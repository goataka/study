name: Request Copilot for PR Overview Comment

on:
  issue_comment:
    types:
      - created

jobs:
  request-copilot:
    name: PR overview コメントを Copilot に転送
    if: >-
      github.event.issue.pull_request != null &&
      github.event.comment.user.type == 'User' &&
      !contains(github.event.comment.body, format('<!-- auto-copilot-pr-overview-comment:{0} -->', github.event.comment.id))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: PR overview コメント内容を Copilot に依頼
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::COPILOT_TOKEN が設定されていません"
            exit 1
          fi

          OWNER="${GH_REPO%%/*}"
          REPO="${GH_REPO#*/}"
          MARKER="<!-- auto-copilot-pr-overview-comment:${COMMENT_ID} -->"
          EXISTING_COMMENT_ID=$(gh api graphql \
            -f query='
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    comments(last: 50) {
                      nodes {
                        databaseId
                        body
                      }
                    }
                  }
                }
              }
            ' \
            -F owner="${OWNER}" \
            -F repo="${REPO}" \
            -F prNumber="${PR_NUMBER}" \
            | jq -r --arg marker "${MARKER}" '
              .data.repository.pullRequest.comments.nodes[]
              | select(.body | contains($marker))
              | .databaseId
            ' \
            | head -1)

          if [ -n "${EXISTING_COMMENT_ID}" ]; then
            echo "::notice::同じ PR overview コメントに対する Copilot 依頼コメントは既に投稿済みです (${EXISTING_COMMENT_ID})"
            exit 0
          fi

          BODY_FILE=$(mktemp)
          {
            echo "${MARKER}"
            echo "@copilot 以下の Pull request overview コメントの内容を確認し、必要に応じて修正・追加実装・質問への回答を行ってください。"
            echo
            echo "- 対象PR: #${PR_NUMBER}"
            echo "- 元コメント投稿者: @${COMMENT_AUTHOR}"
            echo "- 元コメントURL: ${COMMENT_URL}"
            echo
            echo "元コメント:"
            printf '%s\n' "${COMMENT_BODY}" | sed 's/^/> /'
          } > "${BODY_FILE}"

          gh pr comment "${PR_NUMBER}" --body-file "${BODY_FILE}"
          rm -f "${BODY_FILE}"
