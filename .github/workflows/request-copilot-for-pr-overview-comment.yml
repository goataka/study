name: Request Copilot for PR Overview Comment

on:
  issue_comment:
    types:
      - created

jobs:
  request-copilot:
    name: PR overview コメントを Copilot に転送
    if: >-
      github.event.issue.pull_request != null &&
      github.event.comment.user.type != 'Bot' &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: PR overview コメント内容を Copilot に依頼
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_IN_REPLY_TO_ID: ${{ github.event.comment.in_reply_to_id }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENTS_PER_PAGE: "100"
          MAX_PAGE_REQUESTS: "20"
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::COPILOT_TOKEN が設定されていません。リポジトリの Secrets に COPILOT_TOKEN を設定してください。"
            exit 1
          fi

          OWNER="${GH_REPO%%/*}"
          REPO="${GH_REPO#*/}"
          MARKER_PREFIX='<!-- auto-copilot-pr-overview-comment:'
          OVERVIEW_MARKER='## Pull request overview'
          MARKER="${MARKER_PREFIX}${COMMENT_ID} -->"
          if printf '%s' "${COMMENT_BODY}" | jq -Rres --arg marker_prefix "${MARKER_PREFIX}" 'contains($marker_prefix)' >/dev/null; then
            echo "::notice::自動生成した Copilot 依頼コメントのため再転送をスキップします"
            exit 0
          fi

          if [ -z "${COMMENT_IN_REPLY_TO_ID:-}" ]; then
            echo "::notice::Pull request overview スレッドへの返信コメントではないため転送をスキップします"
            exit 0
          fi

          if ! PARENT_COMMENT_JSON=$(gh api "repos/${GH_REPO}/issues/comments/${COMMENT_IN_REPLY_TO_ID}"); then
            echo "::error::親コメントの取得に失敗しました。コメント ID と GitHub API の応答を確認してください。"
            exit 1
          fi
          if ! printf '%s' "${PARENT_COMMENT_JSON}" | jq -e --arg overview_marker "${OVERVIEW_MARKER}" '(.body // "") | contains($overview_marker)' >/dev/null; then
            echo "::notice::Pull request overview コメントへの返信ではないため転送をスキップします"
            exit 0
          fi

          BEFORE_CURSOR=""
          EXISTING_COMMENT_ID=""
          PAGE_REQUEST_COUNT=0

          while [ -z "${EXISTING_COMMENT_ID}" ]; do
            PAGE_REQUEST_COUNT=$((PAGE_REQUEST_COUNT + 1))
            if [ "${PAGE_REQUEST_COUNT}" -gt "${MAX_PAGE_REQUESTS}" ]; then
              echo "::error::PR コメントの重複確認が上限回数を超えました。ページネーション処理を確認してください。"
              exit 1
            fi

            # 自動生成した Copilot 依頼コメントは直近に追加されるため、
            # 最新コメント側からさかのぼって重複確認する。
            GH_COMMAND_ARGS=(
              api
              graphql
              -f query='
                query($owner: String!, $repo: String!, $prNumber: Int!, $commentsPerPage: Int!, $before: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $prNumber) {
                      comments(last: $commentsPerPage, before: $before) {
                        nodes {
                          databaseId
                          body
                        }
                        pageInfo {
                          hasPreviousPage
                          startCursor
                        }
                      }
                    }
                  }
                }
              '
              -F owner="${OWNER}"
              -F repo="${REPO}"
              -F prNumber="${PR_NUMBER}"
              -F commentsPerPage="${COMMENTS_PER_PAGE}"
            )
            if [ -n "${BEFORE_CURSOR}" ]; then
              GH_COMMAND_ARGS+=(-F before="${BEFORE_CURSOR}")
            fi
            if ! RESPONSE=$(gh "${GH_COMMAND_ARGS[@]}"); then
              echo "::error::PR コメント一覧の取得に失敗しました。GitHub API の応答、トークン設定、または一時的な通信エラーを確認してください。"
              exit 1
            fi

            EXISTING_COMMENT_ID=$(printf '%s' "${RESPONSE}" \
              | jq -r --arg marker "${MARKER}" '
                .data.repository.pullRequest.comments.nodes[]
                | select(.body | contains($marker))
                | .databaseId
              ' \
              | head -1)

            if [ -n "${EXISTING_COMMENT_ID}" ]; then
              break
            fi

            HAS_PREVIOUS_PAGE=$(printf '%s' "${RESPONSE}" | jq -r '.data.repository.pullRequest.comments.pageInfo.hasPreviousPage')
            if [ "${HAS_PREVIOUS_PAGE}" != "true" ]; then
              break
            fi

            BEFORE_CURSOR=$(printf '%s' "${RESPONSE}" | jq -r '.data.repository.pullRequest.comments.pageInfo.startCursor // empty')
          done

          if [ -n "${EXISTING_COMMENT_ID}" ]; then
            echo "::notice::同じ PR overview コメントに対する Copilot 依頼コメントは既に投稿済みです (${EXISTING_COMMENT_ID})"
            exit 0
          fi

          BODY_FILE=$(mktemp)
          {
            echo "${MARKER}"
            echo "@copilot 以下の Pull request overview コメントの内容を確認し、必要に応じて修正・追加実装・質問への回答を行ってください。"
            echo
            echo "- 対象PR: #${PR_NUMBER}"
            echo "- 元コメント投稿者: @${COMMENT_AUTHOR}"
            echo "- 元コメントURL: ${COMMENT_URL}"
            echo
            echo "元コメント:"
            printf '%s\n' "${COMMENT_BODY}" | sed 's/^/> /'
          } > "${BODY_FILE}"

          gh pr comment "${PR_NUMBER}" --body-file "${BODY_FILE}"
          rm -f "${BODY_FILE}"
