# Fix GHA Error ワークフロー
# 監視対象のワークフローが失敗で完了した場合に発動し、Copilotエージェントタスクを作成する

name: Fix GHA Error

on:
  workflow_run:
    # ここに監視するワークフロー名を列挙する（各ワークフローの name: フィールドと完全一致が必要）
    workflows:
      - "CI"
      - "Deploy to GitHub Pages"
    types:
      - completed

jobs:
  fix-error:
    name: Copilotエージェントタスクを作成
    runs-on: ubuntu-latest
    # ワークフローが失敗で完了した場合のみ実行する
    if: github.event.workflow_run.conclusion == 'failure'
    permissions:
      contents: read
      issues: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Copilotエージェントタスクを作成
        uses: ./.github/actions/fix-gha-error
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
