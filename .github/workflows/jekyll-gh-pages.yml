# Jekyllサイト（contents/）とViteクイズアプリ（quiz/）をGitHub Pagesにデプロイするワークフロー
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: ビルド（Jekyll + Vite）
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: quiz/package-lock.json

      - name: 依存関係のインストール
        run: npm ci
        working-directory: quiz

      - name: Viteビルド
        run: npm run build
        working-directory: quiz

      - name: GitHub Pages のセットアップ
        uses: actions/configure-pages@v5

      - name: Jekyllサイトのビルド（contents/）
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./contents
          destination: ./_site

      - name: クイズビルドをサイトにコピー
        working-directory: ${{ github.workspace }}
        run: |
          sudo mkdir -p _site/quiz
          sudo cp -r quiz/dist/. _site/quiz/

      - name: Pages アーティファクトのアップロード
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: GitHub Pages へデプロイ
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v5

  e2e-production:
    name: 本番環境E2Eテスト
    runs-on: ubuntu-latest
    needs: deploy
    defaults:
      run:
        working-directory: quiz
    permissions:
      contents: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: quiz/package-lock.json

      - name: 依存関係のインストール
        run: npm ci

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: 本番環境E2Eテスト実行
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}quiz/
        run: npm run test:e2e

      - name: 本番E2Eエビデンスのコミット
        if: success()
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f quiz/e2e-results.json ]; then
            node quiz/scripts/generate-evidence.mjs
            # ログファイルが更新されていればコミット（TEST_EVIDENCE.mdはコンフリクト回避のため除外）
            if ! git diff --quiet quiz/TEST_EVIDENCE_LOG.md 2>/dev/null; then
              git add quiz/TEST_EVIDENCE_LOG.md
              git commit -m "ci: 本番E2Eエビデンスを更新 [skip ci]"
              git push
            fi
          fi

