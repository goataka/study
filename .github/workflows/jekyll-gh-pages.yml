# Jekyllサイト（support/）とViteアプリ（app/）をGitHub Pagesにデプロイするワークフロー
# 環境構成:
# - 転送環境: /   （/v1 へ location.replace で転送）
# - 検証環境: /rc（main からビルドした最新成果物）
# - 本番環境: /v1（最新リリースの成果物）
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  # Playwright の Docker イメージタグ。CI ワークフローと揃えること。
  PLAYWRIGHT_VERSION: "v1.59.1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: ビルド（Jekyll + Vite）
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v6
        with:
          # release 起点でも /rc は常に main の最新成果物を配置する
          ref: main

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Viteビルド
        run: pnpm run build
        working-directory: app

      - name: GitHub Pages のセットアップ
        uses: actions/configure-pages@v6

      - name: Jekyllサイトのビルド（support/）
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./support
          destination: ./_site/support

      - name: アプリビルドを検証環境にコピー
        working-directory: ${{ github.workspace }}
        run: |
          sudo mkdir -p _site/rc
          sudo cp -r app/dist/. _site/rc/

      - name: 転送環境の index.html を配置
        working-directory: ${{ github.workspace }}
        run: |
          sudo cp .github/pages/root-redirect.html _site/index.html

      - name: 最新リリース成果物を取得して本番環境に展開
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          if RELEASE_TAG_OUTPUT="$(gh release list --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName // ""')"; then
            LATEST_TAG="${RELEASE_TAG_OUTPUT}"
          else
            echo "::warning::最新リリースの取得に失敗したため、リリース成果物の展開をスキップしてフォールバックします。"
            LATEST_TAG=""
          fi

          DEPLOYED_FROM_RELEASE="false"
          sudo mkdir -p _site/v1

          if [ -n "${LATEST_TAG}" ]; then
            rm -f /tmp/app-dist.zip
            if gh release download "${LATEST_TAG}" --pattern "app-dist.zip" --dir /tmp; then
              echo "::notice::最新リリース ${LATEST_TAG} の app-dist.zip を /v1 に配置します。"
              sudo unzip -q /tmp/app-dist.zip -d _site/v1
              DEPLOYED_FROM_RELEASE="true"
            else
              echo "::warning::最新リリース ${LATEST_TAG} の app-dist.zip を取得できなかったため、フォールバック展開します。"
            fi
          fi

          if [ "${DEPLOYED_FROM_RELEASE}" = "false" ]; then
            if [ ! -d app/dist ]; then
              echo "::error::app/dist が存在しません。このジョブ内の「Viteビルド」ステップが成功しているか確認してください。"
              exit 1
            fi

            echo "::warning::最新リリース（app-dist.zip）が見つからないため、main のビルド成果物を /v1 に配置します。"
            echo "::warning::本番用の固定成果物を使う場合は release-app.yml を実行してリリースを作成してください。"
            sudo cp -r app/dist/. _site/v1/
          fi

      - name: サポートサイトを本番/検証環境配下にも配置
        working-directory: ${{ github.workspace }}
        run: |
          # Jekyllのビルド先は _site/support/ のため、
          # guide URL（./english/... 等）がRC/本番環境から参照できるよう
          # 教科ディレクトリを rc/ と v1/ 直下にコピーする。
          for subject_dir in english math japanese; do
            if [ -d "_site/support/$subject_dir" ]; then
              sudo cp -r "_site/support/$subject_dir" "_site/rc/"
              sudo cp -r "_site/support/$subject_dir" "_site/v1/"
            fi
          done
          # アプリの href="./support/" リンクが解決できるよう
          # サポートサイト全体を rc/support/ と v1/support/ にも配置する。
          sudo mkdir -p _site/rc/support _site/v1/support
          sudo cp -r _site/support/. _site/rc/support/
          sudo cp -r _site/support/. _site/v1/support/

      - name: Pages アーティファクトのアップロード
        uses: actions/upload-pages-artifact@v5

  deploy:
    name: GitHub Pages へデプロイ
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000

  e2e-production:
    name: RC環境E2Eテスト
    runs-on: ubuntu-latest
    needs: deploy
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v6

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Playwright ブラウザのインストール
        # PLAYWRIGHT_VERSION は env で一元管理（ファイル先頭参照）
        run: pnpm exec playwright install --with-deps chromium

      - name: RCサイトの準備完了を確認
        env:
          PAGES_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          BASE_URL="${PAGES_BASE_URL%/}/"
          APP_URL="${BASE_URL}rc/"
          QUESTIONS_URL="${APP_URL}questions/index.json"
          echo "Waiting for rc site to be ready at ${APP_URL}"
          for i in $(seq 1 12); do
            APP_ERROR=""
            QUESTIONS_ERROR=""
            APP_HTML_FILE=$(mktemp)
            APP_ERROR_LOG=$(mktemp)
            QUESTIONS_ERROR_LOG=$(mktemp)
            if ! APP_STATUS=$(curl --connect-timeout 5 --max-time 10 -sS -L -o "${APP_HTML_FILE}" -w "%{http_code}" "${APP_URL}" 2>"${APP_ERROR_LOG}"); then
              APP_STATUS="CURL_ERROR"
              if [ -s "${APP_ERROR_LOG}" ]; then
                APP_ERROR="yes"
              fi
            fi
            if ! QUESTIONS_STATUS=$(curl --connect-timeout 5 --max-time 10 -sS -L -o /dev/null -w "%{http_code}" "${QUESTIONS_URL}" 2>"${QUESTIONS_ERROR_LOG}"); then
              QUESTIONS_STATUS="CURL_ERROR"
              if [ -s "${QUESTIONS_ERROR_LOG}" ]; then
                QUESTIONS_ERROR="yes"
              fi
            fi
            APP_HTML_READY="no"
            ROOT_DIV_READY="no"
            if [ -s "${APP_HTML_FILE}" ]; then
              APP_HTML_READY="yes"
              if grep -q 'id="root"' "${APP_HTML_FILE}"; then
                ROOT_DIV_READY="yes"
              fi
            fi
            if [ "$APP_STATUS" = "200" ] && [ "$QUESTIONS_STATUS" = "200" ] && [ "$APP_HTML_READY" = "yes" ] && [ "$ROOT_DIV_READY" = "yes" ]; then
              rm -f "${APP_HTML_FILE}" "${APP_ERROR_LOG}" "${QUESTIONS_ERROR_LOG}"
              echo "Site is ready (attempt $i)"
              exit 0
            fi
            echo "Not ready yet (attempt $i)"
            echo "  app: HTTP ${APP_STATUS}, html ${APP_HTML_READY}, rootDiv ${ROOT_DIV_READY}"
            echo "  questions: HTTP ${QUESTIONS_STATUS}"
            if [ -n "${APP_ERROR}" ]; then
              echo "  app curl error:"
              cat "${APP_ERROR_LOG}"
            fi
            if [ -n "${QUESTIONS_ERROR}" ]; then
              echo "  questions curl error:"
              cat "${QUESTIONS_ERROR_LOG}"
            fi
            if [ "$i" -lt 12 ]; then
              echo "  retrying in 10s..."
            fi
            rm -f "${APP_HTML_FILE}" "${APP_ERROR_LOG}" "${QUESTIONS_ERROR_LOG}"
            if [ "$i" -lt 12 ]; then
              sleep 10
            fi
          done
          echo "Site did not become ready within 2 minutes"
          exit 1

      - name: RCアプリの初期化完了を確認
        env:
          PAGES_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          node <<'JS'
          const { chromium } = require("playwright");

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          (async () => {
            const pagesBaseUrl = process.env.PAGES_BASE_URL ?? "";
            const baseUrl = `${pagesBaseUrl.replace(/\/?$/, "/")}rc/`;
            const deadline = Date.now() + 120_000;
            let attempt = 0;
            let lastStatsText = "";

            while (Date.now() < deadline) {
              attempt += 1;
              const browser = await chromium.launch({ headless: true });
              const context = await browser.newContext({ ignoreHTTPSErrors: true });
              const page = await context.newPage();

              try {
                await page.goto(baseUrl, { waitUntil: "load", timeout: 30_000 });
                const statsInfo = page.locator("#statsInfo");
                await statsInfo.waitFor({ state: "visible", timeout: 10_000 });
                await page.waitForFunction(
                  () => {
                    const statsInfoText = document.querySelector("#statsInfo")?.textContent ?? "";
                    const supportMenuVisible = document.querySelector("nav[aria-label='サポートメニュー']") !== null;
                    const supportTabActive = document.querySelector('.subject-tab[data-subject="support"].active') !== null;
                    return /全：[1-9]\d*問/.test(statsInfoText) || supportMenuVisible || supportTabActive;
                  },
                  undefined,
                  { timeout: 30_000 },
                );
                lastStatsText = (await statsInfo.textContent())?.trim() ?? "";
                console.log(`Attempt ${attempt}: statsInfo="${lastStatsText}"`);
                process.exit(0);
              } catch (error) {
                lastStatsText = (await page.locator("#statsInfo").textContent().catch(() => ""))?.trim() ?? "";
                if (lastStatsText) {
                  console.log(`Attempt ${attempt}: statsInfo="${lastStatsText}"`);
                }
                console.log(`Attempt ${attempt}: ${error instanceof Error ? error.message : String(error)}`);
              } finally {
                await browser.close();
              }

              if (Date.now() + 10_000 < deadline) {
                console.log("Retrying in 10s...");
                await sleep(10_000);
              }
            }

            console.error(`RC app did not finish initializing within 2 minutes. Last statsInfo="${lastStatsText}"`);
            process.exit(1);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          JS

      - name: RC環境E2Eテスト実行
        env:
          PAGES_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: PLAYWRIGHT_BASE_URL="${PAGES_BASE_URL%/}/rc/" pnpm run test:e2e
