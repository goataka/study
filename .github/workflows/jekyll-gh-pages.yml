# Jekyllサイト（contents/）とViteクイズアプリ（quiz/）をGitHub Pagesにデプロイするワークフロー
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: ビルド（Jekyll + Vite）
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COPILOT_CLASSIC }}

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Viteビルド
        run: npm run build
        working-directory: quiz

      - name: GitHub Pages のセットアップ
        uses: actions/configure-pages@v5

      - name: Jekyllサイトのビルド（contents/）
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./contents
          destination: ./_site

      - name: クイズビルドをサイトにコピー
        working-directory: ${{ github.workspace }}
        run: |
          sudo mkdir -p _site/quiz
          sudo cp -r quiz/dist/. _site/quiz/

      - name: Pages アーティファクトのアップロード
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: GitHub Pages へデプロイ
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000

  e2e-production:
    name: 本番環境E2Eテスト
    runs-on: ubuntu-latest
    needs: deploy
    defaults:
      run:
        working-directory: quiz
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COPILOT_CLASSIC }}

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: 本番サイトの準備完了を確認
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}quiz/
        run: |
          echo "Waiting for production site to be ready at ${PLAYWRIGHT_BASE_URL}"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PLAYWRIGHT_BASE_URL}questions/index.json")
            if [ "$STATUS" = "200" ]; then
              echo "Site is ready (attempt $i)"
              exit 0
            fi
            echo "Not ready yet (attempt $i, HTTP $STATUS), retrying in 10s..."
            sleep 10
          done
          echo "Site did not become ready within 2 minutes"
          exit 1

      - name: 本番環境E2Eテスト実行
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}quiz/
        run: npm run test:e2e

