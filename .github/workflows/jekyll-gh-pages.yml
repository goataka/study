# Jekyllサイト（support/）とViteアプリ（app/）をGitHub Pagesにデプロイするワークフロー
# 環境構成:
# - 転送環境: /   （/v1 へ location.replace で転送）
# - 検証環境: /v0（main からビルドした最新成果物）
# - 本番環境: /v1（最新リリースの成果物）
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  # Playwright の Docker イメージタグ。CI ワークフローと揃えること。
  PLAYWRIGHT_VERSION: "v1.59.1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: ビルド（Jekyll + Vite）
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v6

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Viteビルド
        run: npm run build
        working-directory: app

      - name: GitHub Pages のセットアップ
        uses: actions/configure-pages@v6

      - name: Jekyllサイトのビルド（support/）
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./support
          destination: ./_site

      - name: アプリビルドをサイトにコピー
        working-directory: ${{ github.workspace }}
        run: |
          sudo mkdir -p _site/v0
          sudo cp -r app/dist/. _site/v0/

      - name: 転送環境の index.html を生成
        working-directory: ${{ github.workspace }}
        run: |
          cat <<'HTML' | sudo tee _site/index.html > /dev/null
          <!doctype html>
          <html lang="ja">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Goataka Study</title>
              <script>
                const basePath = window.location.pathname.replace(/\/$/, "");
                const targetPath = basePath ? `${basePath}/v1/` : "/v1/";
                window.location.replace(targetPath);
              </script>
            </head>
            <body>
              <noscript>
                JavaScript を有効にしてください。<a href="./v1/">本番環境へ移動</a>
              </noscript>
            </body>
          </html>
          HTML

      - name: 最新リリース成果物を取得して本番環境に展開
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          RELEASE_JSON="$(curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/releases/latest")"
          ASSET_URL="$(echo "${RELEASE_JSON}" | jq -r '.assets[] | select(.name == "app-dist.zip") | .browser_download_url' | head -n1)"

          if [ -z "${ASSET_URL}" ] || [ "${ASSET_URL}" = "null" ]; then
            echo "最新リリースが存在しないか、app-dist.zip が見つかりません。"
            echo "release-app.yml を実行して本番用リリースを作成してください。"
            exit 1
          fi

          curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "${ASSET_URL}" \
            -o /tmp/app-dist.zip

          sudo mkdir -p _site/v1
          sudo unzip -q /tmp/app-dist.zip -d _site/v1

      - name: Pages アーティファクトのアップロード
        uses: actions/upload-pages-artifact@v5

  deploy:
    name: GitHub Pages へデプロイ
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000

  e2e-production:
    name: 本番環境E2Eテスト
    runs-on: ubuntu-latest
    needs: deploy
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v6

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Playwright ブラウザのインストール
        # PLAYWRIGHT_VERSION は env で一元管理（ファイル先頭参照）
        run: npx playwright install --with-deps chromium

      - name: 本番サイトの準備完了を確認
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          echo "Waiting for production site to be ready at ${PLAYWRIGHT_BASE_URL}"
          BASE_URL="${PLAYWRIGHT_BASE_URL%/}/"
          QUESTIONS_URL="${BASE_URL}questions/index.json"
          for i in $(seq 1 12); do
            APP_ERROR=""
            QUESTIONS_ERROR=""
            APP_HTML_FILE=$(mktemp)
            APP_ERROR_LOG=$(mktemp)
            QUESTIONS_ERROR_LOG=$(mktemp)
            if ! APP_STATUS=$(curl --connect-timeout 5 --max-time 10 -sS -L -o "${APP_HTML_FILE}" -w "%{http_code}" "${BASE_URL}" 2>"${APP_ERROR_LOG}"); then
              APP_STATUS="CURL_ERROR"
              if [ -s "${APP_ERROR_LOG}" ]; then
                APP_ERROR="yes"
              fi
            fi
            if ! QUESTIONS_STATUS=$(curl --connect-timeout 5 --max-time 10 -sS -L -o /dev/null -w "%{http_code}" "${QUESTIONS_URL}" 2>"${QUESTIONS_ERROR_LOG}"); then
              QUESTIONS_STATUS="CURL_ERROR"
              if [ -s "${QUESTIONS_ERROR_LOG}" ]; then
                QUESTIONS_ERROR="yes"
              fi
            fi
            APP_HTML_READY="no"
            ROOT_DIV_READY="no"
            if [ -s "${APP_HTML_FILE}" ]; then
              APP_HTML_READY="yes"
              if grep -q 'id="root"' "${APP_HTML_FILE}"; then
                ROOT_DIV_READY="yes"
              fi
            fi
            if [ "$APP_STATUS" = "200" ] && [ "$QUESTIONS_STATUS" = "200" ] && [ "$APP_HTML_READY" = "yes" ] && [ "$ROOT_DIV_READY" = "yes" ]; then
              rm -f "${APP_HTML_FILE}" "${APP_ERROR_LOG}" "${QUESTIONS_ERROR_LOG}"
              echo "Site is ready (attempt $i)"
              exit 0
            fi
            echo "Not ready yet (attempt $i)"
            echo "  app: HTTP ${APP_STATUS}, html ${APP_HTML_READY}, rootDiv ${ROOT_DIV_READY}"
            echo "  questions: HTTP ${QUESTIONS_STATUS}"
            if [ -n "${APP_ERROR}" ]; then
              echo "  app curl error:"
              cat "${APP_ERROR_LOG}"
            fi
            if [ -n "${QUESTIONS_ERROR}" ]; then
              echo "  questions curl error:"
              cat "${QUESTIONS_ERROR_LOG}"
            fi
            if [ "$i" -lt 12 ]; then
              echo "  retrying in 10s..."
            fi
            rm -f "${APP_HTML_FILE}" "${APP_ERROR_LOG}" "${QUESTIONS_ERROR_LOG}"
            if [ "$i" -lt 12 ]; then
              sleep 10
            fi
          done
          echo "Site did not become ready within 2 minutes"
          exit 1

      - name: 本番アプリの初期化完了を確認
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          node <<'JS'
          const { chromium } = require("playwright");

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          (async () => {
            const baseUrl = process.env.PLAYWRIGHT_BASE_URL;
            const deadline = Date.now() + 120_000;
            let attempt = 0;
            let lastStatsText = "";

            while (Date.now() < deadline) {
              attempt += 1;
              const browser = await chromium.launch({ headless: true });
              const context = await browser.newContext({ ignoreHTTPSErrors: true });
              const page = await context.newPage();

              try {
                await page.goto(baseUrl, { waitUntil: "load", timeout: 30_000 });
                const statsInfo = page.locator("#statsInfo");
                await statsInfo.waitFor({ state: "visible", timeout: 10_000 });
                await page.waitForFunction(
                  () => /全：[1-9]\d*問/.test(document.querySelector("#statsInfo")?.textContent ?? ""),
                  undefined,
                  { timeout: 30_000 },
                );
                lastStatsText = (await statsInfo.textContent())?.trim() ?? "";
                console.log(`Attempt ${attempt}: statsInfo="${lastStatsText}"`);
                process.exit(0);
              } catch (error) {
                lastStatsText = (await page.locator("#statsInfo").textContent().catch(() => ""))?.trim() ?? "";
                if (lastStatsText) {
                  console.log(`Attempt ${attempt}: statsInfo="${lastStatsText}"`);
                }
                console.log(`Attempt ${attempt}: ${error instanceof Error ? error.message : String(error)}`);
              } finally {
                await browser.close();
              }

              if (Date.now() + 10_000 < deadline) {
                console.log("Retrying in 10s...");
                await sleep(10_000);
              }
            }

            console.error(`Production app did not finish initializing within 2 minutes. Last statsInfo="${lastStatsText}"`);
            process.exit(1);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          JS

      - name: 本番環境E2Eテスト実行
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: npm run test:e2e
