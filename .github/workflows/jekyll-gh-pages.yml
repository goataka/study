# Jekyllサイト（support/）とViteアプリ（app/）をGitHub Pagesにデプロイするワークフロー
# アプリはサイトのトップ（/）に配置し、サポートコンテンツは /support/ 以下に配置する
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: ビルド（Jekyll + Vite）
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v6

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Viteビルド
        run: npm run build
        working-directory: app

      - name: GitHub Pages のセットアップ
        uses: actions/configure-pages@v6

      - name: Jekyllサイトのビルド（support/）
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./support
          destination: ./_site

      - name: アプリビルドをサイトにコピー
        working-directory: ${{ github.workspace }}
        run: |
          sudo cp -r app/dist/. _site/

      - name: Pages アーティファクトのアップロード
        uses: actions/upload-pages-artifact@v5

  deploy:
    name: GitHub Pages へデプロイ
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000

  e2e-production:
    name: 本番環境E2Eテスト
    runs-on: ubuntu-latest
    needs: deploy
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v6

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Playwright ブラウザのインストール
        # PLAYWRIGHT_VERSION は env で一元管理（ファイル先頭参照）
        run: npx playwright install --with-deps chromium

      - name: 本番サイトの準備完了を確認
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          echo "Waiting for production site to be ready at ${PLAYWRIGHT_BASE_URL}"
          BASE_URL="${PLAYWRIGHT_BASE_URL%/}/"
          QUESTIONS_URL="${BASE_URL}questions/index.json"
          for i in $(seq 1 12); do
            APP_ERROR=""
            QUESTIONS_ERROR=""
            APP_HTML_FILE=$(mktemp)
            APP_ERROR_LOG=$(mktemp)
            QUESTIONS_ERROR_LOG=$(mktemp)
            if ! APP_STATUS=$(curl --connect-timeout 5 --max-time 10 -sS -L -o "${APP_HTML_FILE}" -w "%{http_code}" "${BASE_URL}" 2>"${APP_ERROR_LOG}"); then
              APP_STATUS="CURL_ERROR"
              if [ -s "${APP_ERROR_LOG}" ]; then
                APP_ERROR="yes"
              fi
            fi
            if ! QUESTIONS_STATUS=$(curl --connect-timeout 5 --max-time 10 -sS -L -o /dev/null -w "%{http_code}" "${QUESTIONS_URL}" 2>"${QUESTIONS_ERROR_LOG}"); then
              QUESTIONS_STATUS="CURL_ERROR"
              if [ -s "${QUESTIONS_ERROR_LOG}" ]; then
                QUESTIONS_ERROR="yes"
              fi
            fi
            APP_HTML_READY="no"
            STATS_INFO_READY="no"
            if [ -s "${APP_HTML_FILE}" ]; then
              APP_HTML_READY="yes"
              if grep -q 'id="statsInfo"' "${APP_HTML_FILE}"; then
                STATS_INFO_READY="yes"
              fi
            fi
            if [ "$APP_STATUS" = "200" ] && [ "$QUESTIONS_STATUS" = "200" ] && [ "$APP_HTML_READY" = "yes" ] && [ "$STATS_INFO_READY" = "yes" ]; then
              rm -f "${APP_HTML_FILE}" "${APP_ERROR_LOG}" "${QUESTIONS_ERROR_LOG}"
              echo "Site is ready (attempt $i)"
              exit 0
            fi
            echo "Not ready yet (attempt $i)"
            echo "  app: HTTP ${APP_STATUS}, html ${APP_HTML_READY}, statsInfo ${STATS_INFO_READY}"
            echo "  questions: HTTP ${QUESTIONS_STATUS}"
            if [ -n "${APP_ERROR}" ]; then
              echo "  app curl error:"
              cat "${APP_ERROR_LOG}"
            fi
            if [ -n "${QUESTIONS_ERROR}" ]; then
              echo "  questions curl error:"
              cat "${QUESTIONS_ERROR_LOG}"
            fi
            if [ "$i" -lt 12 ]; then
              echo "  retrying in 10s..."
            fi
            rm -f "${APP_HTML_FILE}" "${APP_ERROR_LOG}" "${QUESTIONS_ERROR_LOG}"
            if [ "$i" -lt 12 ]; then
              sleep 10
            fi
          done
          echo "Site did not become ready within 2 minutes"
          exit 1

      - name: 本番環境E2Eテスト実行
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: npm run test:e2e
