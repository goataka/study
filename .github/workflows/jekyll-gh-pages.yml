# Workflow for building and deploying to GitHub Pages
# - Jekyll builds the contents/ drills
# - Vite builds the quiz/ app
# Both are combined into a single GitHub Pages deployment

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: quiz/package-lock.json

      - name: Install quiz dependencies
        run: cd quiz && npm ci

      - name: Build quiz (Vite)
        run: cd quiz && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site (contents/)
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./contents
          destination: ./_site

      - name: Copy quiz build into site
        run: cp -r quiz/dist/ _site/quiz/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

