# Fix GHA Error ワークフロー
# 監視対象のワークフローが失敗で完了した場合に発動し、Copilotに修正を依頼する
# PRがある場合はPRにCopilotをメンションしてコメント、
# PRがない場合はIssueを作成してCopilotをアサインする（同一ワークフローのIssueがあればコメントを追加）

name: Fix GHA Error

on:
  workflow_run:
    # ここに監視するワークフロー名を列挙する（各ワークフローの name: フィールドと完全一致が必要）
    workflows:
      - "CI"
      - "Deploy to GitHub Pages"
    types:
      - completed

concurrency:
  group: fix-gha-error-${{ github.event.workflow_run.name }}
  cancel-in-progress: false

jobs:
  fix-error:
    name: CopilotにCI修正を依頼
    runs-on: ubuntu-latest
    # ワークフローが失敗で完了し、かつトリガー元が同一リポジトリの場合のみ実行する（fork対策）
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_repository.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: CopilotにCI修正を依頼
        uses: ./.github/actions/fix-gha-error
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
