name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-build:
    name: 単体テスト・ビルド（quiz）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quiz
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: quiz/package-lock.json

      - name: 依存関係のインストール
        run: npm ci

      - name: 単体テスト実行
        run: npm run test

      - name: Viteビルド
        run: npm run build

  e2e:
    name: E2Eテスト（quiz）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quiz
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: quiz/package-lock.json

      - name: 依存関係のインストール
        run: npm ci

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: Viteビルド（E2E用）
        run: npm run build

      - name: E2Eテスト実行（Gherkin シナリオ）
        run: npm run test:e2e

  visual-regression:
    name: ビジュアルリグレッションテスト（quiz）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quiz
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: quiz/package-lock.json

      - name: 依存関係のインストール
        run: npm ci

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: Viteビルド（VR用）
        run: npm run build

      - name: ビジュアルリグレッションテスト実行
        run: npm run test:e2e:vr

      - name: VRレポートのアップロード（失敗時）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vr-report
          path: quiz/vr-report/
          retention-days: 7

  markdownlint:
    name: Markdownリント
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Markdownの自動修正
        run: |
          npx --yes markdownlint-cli --fix "**/*.md" --ignore node_modules --ignore quiz/node_modules 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "ci: markdownlint の自動修正 [skip ci]"
            git push
          fi

      - name: reviewdog による Markdown チェック
        uses: reviewdog/action-markdownlint@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: warning
          markdownlint_flags: "."
