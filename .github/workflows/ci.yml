name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-build:
    name: 単体テスト・ビルド（quiz）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quiz
    permissions:
      contents: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        with:
          # PRでは実際のブランチheadをチェックアウト（エビデンスファイルのプッシュ用）
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: quiz/package-lock.json

      - name: 依存関係のインストール
        run: npm ci

      - name: 単体テスト実行・エビデンス生成
        run: npm run test:evidence

      - name: テストエビデンスのコミット（PRのみ）
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet quiz/TEST_EVIDENCE.md; then
            git add quiz/TEST_EVIDENCE.md
            git commit -m "ci: テストエビデンスを更新 [skip ci]"
            git push
          fi

      - name: Viteビルド
        run: npm run build

  e2e:
    name: E2Eテスト（quiz）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quiz
    permissions:
      contents: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: quiz/package-lock.json

      - name: 依存関係のインストール
        run: npm ci

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: Viteビルド（E2E用）
        run: npm run build

      - name: E2Eテスト実行（Gherkin シナリオ）
        run: npm run test:e2e

      - name: E2Eエビデンスのコミット（PRのみ）
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # e2e-results.json が存在する場合のみエビデンスを再生成してコミット
          if [ -f quiz/e2e-results.json ]; then
            node quiz/scripts/generate-evidence.mjs
            if ! git diff --quiet quiz/TEST_EVIDENCE.md; then
              git add quiz/TEST_EVIDENCE.md
              git commit -m "ci: E2Eエビデンスを更新 [skip ci]"
              git push
            fi
          fi

  markdownlint:
    name: Markdownリント
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Markdownの自動修正
        run: |
          npx --yes markdownlint-cli --fix "**/*.md" --ignore node_modules --ignore quiz/node_modules 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "ci: markdownlint の自動修正 [skip ci]"
            git push
          fi

      - name: reviewdog による Markdown チェック
        uses: reviewdog/action-markdownlint@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: warning
          markdownlint_flags: "."
