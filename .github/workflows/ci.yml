name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  test-and-build:
    name: 単体テスト・ビルド（quiz）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quiz
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 単体テスト実行
        run: npm run test

      - name: Viteビルド
        run: npm run build

  e2e:
    name: E2Eテスト（quiz）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quiz
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: Viteビルド（E2E用）
        run: npm run build

      - name: E2Eテスト実行（Gherkin シナリオ）
        run: npm run test:e2e

  visual-regression:
    name: ビジュアルリグレッションテスト（quiz）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quiz
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 日本語フォントのインストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk

      - name: ロケールの設定
        run: |
          sudo apt-get install -y locales
          sudo locale-gen ja_JP.UTF-8
          sudo update-locale LANG=ja_JP.UTF-8 LC_ALL=ja_JP.UTF-8

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: Viteビルド（VR用）
        run: npm run build

      - name: ビジュアルリグレッションテスト実行
        run: npm run test:e2e:vr

      - name: VRレポートのアップロード（失敗時）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vr-report
          path: quiz/vr-report/
          retention-days: 7

  update-vr-snapshots:
    name: VRスナップショット自動更新（quiz）
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 日本語フォントのインストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk

      - name: ロケールの設定
        run: |
          sudo apt-get install -y locales
          sudo locale-gen ja_JP.UTF-8
          sudo update-locale LANG=ja_JP.UTF-8 LC_ALL=ja_JP.UTF-8

      - name: Playwright ブラウザのインストール
        working-directory: quiz
        run: npx playwright install --with-deps chromium

      - name: Viteビルド（VR用）
        working-directory: quiz
        run: npm run build

      - name: VRスナップショットの更新
        working-directory: quiz
        run: npm run test:e2e:vr:update

      - name: 変更のある画像のみコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- "quiz/e2e/snapshots/"; then
            git add -- "quiz/e2e/snapshots/"
            git commit -m "ci: VRスナップショットの自動更新 [skip ci]"
            git push
          fi

  markdownlint:
    name: Markdownリント
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Markdownの自動修正
        run: |
          npx --yes markdownlint-cli --fix "**/*.md" --ignore node_modules --ignore quiz/node_modules 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "ci: markdownlint の自動修正 [skip ci]"
            git push
          fi

      - name: reviewdog による Markdown チェック
        uses: reviewdog/action-markdownlint@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: warning
          markdownlint_flags: "."
