name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "22"
  # Playwright の Docker イメージタグ。
  # @playwright/test の package.json バージョンと揃えること（mismatch するとブラウザがロードできない）。
  PLAYWRIGHT_VERSION: "v1.59.1"

jobs:
  test-and-build:
    name: 単体テスト・ビルド（app）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint 実行
        run: npm run lint

      - name: フォーマット確認（Prettier）
        run: npm run format:check

      - name: 単体テスト実行
        run: npm run test

      - name: Viteビルド
        run: npm run build

  e2e:
    name: E2Eテスト（app）
    runs-on: ubuntu-latest
    container:
      # PLAYWRIGHT_VERSION は env で一元管理（ファイル先頭参照）
      image: mcr.microsoft.com/playwright:${{ env.PLAYWRIGHT_VERSION }}-noble
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Git safe directory の設定（コンテナ内UID不一致対応）
        run: git config --global --add safe.directory /__w/study/study

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Viteビルド（E2E用）
        run: npm run build

      - name: E2Eテスト実行（Gherkin シナリオ）
        run: npm run test:e2e

  visual-regression:
    name: ビジュアルリグレッションテスト（app）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    permissions:
      contents: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.COPILOT_CLASSIC }}

      - name: Node.js 環境のセットアップ
        uses: ./.github/actions/setup-quiz
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 日本語フォントとロケールのインストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk locales
          sudo locale-gen ja_JP.UTF-8
          sudo update-locale LANG=ja_JP.UTF-8 LC_ALL=ja_JP.UTF-8

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: Viteビルド（VR用）
        run: npm run build

      - name: ビジュアルリグレッションテスト実行
        id: vr-test
        run: npm run test:e2e:vr
        continue-on-error: true

      - name: スナップショットの自動更新とコミット（差分あり時）
        if: steps.vr-test.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          npm run test:e2e:vr:update || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- e2e/snapshots/; then
            git add e2e/snapshots/
            LEFTHOOK=0 git commit -m "ci: VRスナップショットを自動更新 [skip ci]"
            git push
          fi

      - name: ビジュアルリグレッションテスト（スナップショット更新後の再確認）
        id: vr-recheck
        if: steps.vr-test.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: npm run test:e2e:vr
        continue-on-error: true

      # 初回VRテスト失敗時のみ、再確認結果を最終判定に使う
      - name: ビジュアルリグレッションテスト結果の最終判定
        if: steps.vr-test.outcome == 'failure'
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "VRテストが失敗しました。自動更新できない実行コンテキストのため失敗として終了します。"
            exit 1
          fi

          # 再確認が failure のときのみ最終的に失敗扱いにする
          if [ "${{ steps.vr-recheck.outcome }}" = "failure" ]; then
            echo "スナップショット更新後の再確認でもVRテストが失敗しました。"
            exit 1
          fi

      - name: VRレポートのアップロード（失敗時）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vr-report
          path: app/vr-report/
          retention-days: 7

  markdownlint:
    name: Markdownリント
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.COPILOT_CLASSIC }}

      - name: Markdownの自動修正
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          npx --yes markdownlint-cli --fix "**/*.md" --ignore node_modules --ignore quiz/node_modules 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "ci: markdownlint の自動修正 [skip ci]"
            git push
          fi

      - name: reviewdog による Markdown チェック
        uses: reviewdog/action-markdownlint@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: warning
          markdownlint_flags: "."
