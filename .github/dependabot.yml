# Dependabot 設定: NPM パッケージと GitHub Actions の依存を自動更新する
version: 2
updates:
  # アプリの NPM 依存関係
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    groups:
      # 開発依存はまとめて1つのPRにする
      dev-dependencies:
        dependency-type: "development"
      # マイナー・パッチ更新はまとめる
      minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions のワークフロー
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"
