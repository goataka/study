# GHAエラー修正用コンポジットアクション
# workflow_runイベントで失敗したワークフローを検知し、Copilotに修正を依頼する
# PRがある場合はPRにCopilotをメンションしてコメント、
# PRがない場合は同一ワークフローのオープンIssueを検索して
# 存在すればコメントを追加、なければ新規Issueを作成してCopilotをアサインする

name: "Fix GHA Error"
description: "GHAエラー発生時にCopilotに修正を依頼する（PRコメント or Issue作成）"
branding:
  icon: "alert-circle"
  color: "red"

inputs:
  github-token:
    description: "GitHub token for authentication (GITHUB_TOKEN)"
    required: true
  error-context:
    description: "エラーの詳細情報（オプション）"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: 前提コマンドの確認
      shell: bash
      run: |
        set -euo pipefail

        # jq の存在確認
        if ! command -v jq &>/dev/null; then
          echo "::error::jq が見つかりません。ubuntu-latest 以外のrunnerを使用している場合は jq をインストールしてください。"
          exit 1
        fi
        # gh CLI の存在確認
        if ! command -v gh &>/dev/null; then
          echo "::error::gh CLI が見つかりません。ubuntu-latest 以外のrunnerを使用している場合は gh CLI をインストールしてください。"
          exit 1
        fi
        echo "::notice::前提コマンド (jq, gh) の確認が完了しました"

    - name: 入力値とコンテキストのチェック
      id: validate-input
      shell: bash
      env:
        GITHUB_TOKEN_INPUT: ${{ inputs.github-token }}
        WF_NAME: ${{ github.event.workflow_run.name }}
        WF_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        WF_HTML_URL: ${{ github.event.workflow_run.html_url }}
        WF_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      run: |
        set -euo pipefail

        echo "::add-mask::${GITHUB_TOKEN_INPUT}"

        required=(GITHUB_TOKEN_INPUT WF_NAME WF_HEAD_SHA WF_HTML_URL)
        missing=()

        for key in "${required[@]}"; do
          if [ -z "${!key:-}" ]; then
            missing+=("$key")
          fi
        done

        if [ "${#missing[@]}" -gt 0 ]; then
          echo "::error::必須の値が空です: ${missing[*]}"
          exit 1
        fi

        if [ -z "${WF_HEAD_BRANCH:-}" ]; then
          echo "::warning::workflow_run.head_branch が空です。PR情報から後続で判定します。"
        fi

        echo "::notice::入力値とコンテキストの基本チェックが完了しました (workflow=${WF_NAME}, commit=${WF_HEAD_SHA:0:7})"

    - name: エラー情報の収集
      id: collect-error
      shell: bash
      env:
        WF_NAME: ${{ github.event.workflow_run.name }}
        WF_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        WF_HTML_URL: ${{ github.event.workflow_run.html_url }}
        WF_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        WF_PULL_REQUESTS: ${{ toJson(github.event.workflow_run.pull_requests) }}
      run: |
        set -euo pipefail

        # workflow_runイベントから情報を取得（環境変数経由でインジェクション防止）
        WORKFLOW_NAME="${WF_NAME}"
        COMMIT_SHA="${WF_HEAD_SHA}"
        COMMIT_SHORT="${COMMIT_SHA:0:7}"
        RUN_URL="${WF_HTML_URL}"

        echo "workflow_name=${WORKFLOW_NAME}" >> $GITHUB_OUTPUT
        echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
        echo "commit_short=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
        echo "run_url=${RUN_URL}" >> $GITHUB_OUTPUT

        # PRが関連しているかチェック
        PR_COUNT=$(echo "${WF_PULL_REQUESTS}" | jq 'length // 0')
        if [ "$PR_COUNT" -gt 0 ]; then
          TARGET_BRANCH=$(echo "${WF_PULL_REQUESTS}" | jq -r '.[0].head.ref // empty')
          PR_NUMBER=$(echo "${WF_PULL_REQUESTS}" | jq -r '.[0].number // empty')
          if [ -n "$TARGET_BRANCH" ] && [ -n "$PR_NUMBER" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "target_branch=${TARGET_BRANCH}" >> $GITHUB_OUTPUT
            echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "::notice::PRベースのワークフロー実行です (PR #${PR_NUMBER}, ブランチ: ${TARGET_BRANCH})"
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
            echo "target_branch=${WF_HEAD_BRANCH}" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "::notice::ブランチベースのワークフロー実行です (ターゲット: ${WF_HEAD_BRANCH})"
          fi
        else
          TARGET_BRANCH="${WF_HEAD_BRANCH}"
          if [ -z "$TARGET_BRANCH" ]; then
            echo "::error::ターゲットブランチを特定できませんでした"
            exit 1
          fi
          echo "is_pr=false" >> $GITHUB_OUTPUT
          echo "target_branch=${TARGET_BRANCH}" >> $GITHUB_OUTPUT
          echo "pr_number=" >> $GITHUB_OUTPUT
          echo "::notice::ブランチベースのワークフロー実行です (ターゲット: ${TARGET_BRANCH})"
        fi

        if [ -z "${RUN_URL}" ] || [ -z "${COMMIT_SHORT}" ] || [ -z "${WORKFLOW_NAME}" ]; then
          echo "::error::ワークフロー名・コミット・ログURLのいずれかが取得できませんでした"
          exit 1
        fi

        echo "::notice::収集した情報: workflow=${WORKFLOW_NAME}, commit=${COMMIT_SHORT}, target_branch=${TARGET_BRANCH}, pr_count=${PR_COUNT:-0}"

    - name: CopilotにCI修正を依頼
      id: request-fix
      shell: bash
      env:
        WORKFLOW_NAME: ${{ steps.collect-error.outputs.workflow_name }}
        COMMIT_SHORT: ${{ steps.collect-error.outputs.commit_short }}
        RUN_URL: ${{ steps.collect-error.outputs.run_url }}
        IS_PR: ${{ steps.collect-error.outputs.is_pr }}
        TARGET_BRANCH: ${{ steps.collect-error.outputs.target_branch }}
        PR_NUMBER: ${{ steps.collect-error.outputs.pr_number }}
        ERROR_CONTEXT: ${{ inputs.error-context }}
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        if [ -z "${TARGET_BRANCH}" ]; then
          echo "::error::ターゲットブランチを特定できませんでした"
          exit 1
        fi

        # 本文をヒアドキュメントで一時ファイルに書き込む（すべての値は環境変数経由でインジェクション防止）
        BODY_FILE=$(mktemp)

        if [ "$IS_PR" = "true" ]; then
          # PRがある場合: PRにCopilotをメンションしてコメントを投稿
          cat >"$BODY_FILE" <<EOF
        @copilot GitHub Actionsワークフロー「${WORKFLOW_NAME}」が失敗しました (コミット: ${COMMIT_SHORT})。CIエラーを確認して修正をお願いします。

        ## エラー情報

        - **ワークフロー**: ${WORKFLOW_NAME}
        - **コミット**: ${COMMIT_SHORT}
        - **PR**: #${PR_NUMBER}
        - **CIログ**: ${RUN_URL}
        EOF

          if [ -n "${ERROR_CONTEXT}" ]; then
            printf -- '- **エラー詳細**: %s\n' "${ERROR_CONTEXT}" >>"$BODY_FILE"
          fi

          gh pr comment "${PR_NUMBER}" --body-file "$BODY_FILE"
          echo "::notice::PR #${PR_NUMBER} にCopilotメンションコメントを投稿しました"
        else
          # PRがない場合: 同一ワークフローのオープンIssueを検索
          ISSUE_TITLE="[CI失敗] ${WORKFLOW_NAME}"

          EXISTING_ISSUE_NUMBER=$(gh issue list \
            --state open \
            --search "${ISSUE_TITLE} in:title" \
            --limit 1000 \
            --json number,title \
            | jq -r --arg title "${ISSUE_TITLE}" '.[] | select(.title == $title) | .number' \
            | head -1)

          if [ -n "${EXISTING_ISSUE_NUMBER}" ]; then
            # 既存Issueがある場合: コメントを追加してCopilotをメンション
            cat >"$BODY_FILE" <<EOF
        @copilot ワークフロー「${WORKFLOW_NAME}」が再度失敗しました (コミット: ${COMMIT_SHORT})。引き続き対応をお願いします。

        - **CIログ**: ${RUN_URL}
        - **ブランチ**: ${TARGET_BRANCH}
        EOF

            if [ -n "${ERROR_CONTEXT}" ]; then
              printf -- '- **エラー詳細**: %s\n' "${ERROR_CONTEXT}" >>"$BODY_FILE"
            fi

            gh issue comment "${EXISTING_ISSUE_NUMBER}" --body-file "$BODY_FILE"
            echo "::notice::既存Issue #${EXISTING_ISSUE_NUMBER} にCopilotメンションコメントを追加しました"
          else
            # 既存Issueがない場合: 新規Issueを作成してCopilotをアサイン
            cat >"$BODY_FILE" <<EOF
        @copilot GitHub Actionsワークフロー「${WORKFLOW_NAME}」が失敗しました。対応をお願いします。

        ## エラー情報

        - **ワークフロー**: ${WORKFLOW_NAME}
        - **コミット**: ${COMMIT_SHORT}
        - **CIログ**: ${RUN_URL}
        - **ブランチ**: ${TARGET_BRANCH}
        EOF

            if [ -n "${ERROR_CONTEXT}" ]; then
              printf -- '- **エラー詳細**: %s\n' "${ERROR_CONTEXT}" >>"$BODY_FILE"
            fi

            cat >>"$BODY_FILE" <<EOF

        ## 修正手順

        1. ワークフロー実行ログを確認してエラーの原因を特定する
           - ログURL: ${RUN_URL}

        2. エラーの原因を修正する

        3. 必要に応じてテストを実行して修正を確認する

        4. \`${TARGET_BRANCH}\` ブランチをターゲットとしたPRを作成する
        EOF

            gh issue create \
              --title "${ISSUE_TITLE}" \
              --body-file "$BODY_FILE" \
              --assignee "copilot" \
            || gh issue create \
              --title "${ISSUE_TITLE}" \
              --body-file "$BODY_FILE"
            echo "::notice::新規Issue「${ISSUE_TITLE}」を作成してCopilotをアサインしました"
          fi
        fi

        # 一時ファイルを削除
        rm -f "$BODY_FILE"
