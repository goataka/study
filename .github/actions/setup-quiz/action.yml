# app ディレクトリの Node.js 環境をセットアップするコンポジットアクション
# 各ジョブで繰り返される「Node.js セットアップ + pnpm install」の共通処理を集約する
name: "Setup App"
description: "Node.js のセットアップと app の依存関係をインストールする"

inputs:
  node-version:
    description: "Node.js のバージョン"
    required: false
    default: "22"

runs:
  using: "composite"
  steps:
    - name: pnpm のセットアップ
      uses: pnpm/action-setup@v4
      with:
        version: 10
        run_install: false

    - name: Node.js のセットアップ
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"
        cache-dependency-path: app/pnpm-lock.yaml

    - name: 依存関係のインストール
      shell: bash
      working-directory: ${{ github.workspace }}/app
      run: pnpm install --frozen-lockfile
